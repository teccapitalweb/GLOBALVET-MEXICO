<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca · Club VIP GlobalVet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/club.css">
  <link rel="stylesheet" href="../assets/css/club-mobile.css">
  <link rel="stylesheet" href="../assets/css/club-theme.css">
  <style>
    /* Overlay centrado, con scroll si contenido excede */
    .player-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 1000;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .player-overlay.is-open { display: flex; }

    .player-box {
      width: 100%;
      max-width: 720px;
      background: var(--zoo-bg-card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--zoo-border-strong);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      margin: auto 0;
    }

    .player-box__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--zoo-border);
      flex-shrink: 0;
      gap: 12px;
    }
    .player-box__header h3 {
      color: #fff;
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-box__close {
      background: rgba(255,255,255,0.05);
      border: 0;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .player-box__close:hover { background: rgba(213,90,40,0.3); }

    /* Video container 16:9 */
    .player-box__video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      flex-shrink: 0;
    }
    .player-box__video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .player-box__info {
      padding: 14px 20px 18px;
      flex-shrink: 0;
    }
    .player-box__info p {
      color: var(--zoo-text-muted);
      font-size: .88rem;
      margin: 0;
      line-height: 1.5;
    }

    /* Lista de clases — compacta y scrolleable */
    .classes-list-box {
      background: var(--zoo-bg-card);
      padding: 18px 20px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .classes-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .classes-list-title {
      color: var(--zoo-amber);
      font-size: .78rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      margin: 0;
    }
    .classes-progress-bar {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .classes-progress-bar__fill {
      height: 100%;
      background: linear-gradient(90deg, #3d8b42, #6FBF73);
      border-radius: 100px;
      transition: width .6s;
    }
    .class-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .class-item.is-done {
      background: rgba(111,191,115,0.08);
      border-color: rgba(111,191,115,0.25);
    }
    .class-item__num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f1d17;
      font-weight: 800;
      font-size: .9rem;
      flex-shrink: 0;
      background: linear-gradient(135deg, #E8A317, #D68A0A);
    }
    .class-item.is-done .class-item__num {
      background: linear-gradient(135deg, #6FBF73, #3d8b42);
    }
    .class-item__body {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }
    .class-item__title {
      color: #fff;
      font-weight: 600;
      font-size: .92rem;
      line-height: 1.3;
    }
    .class-item__desc {
      color: var(--zoo-text-muted);
      font-size: .82rem;
      line-height: 1.45;
      margin-top: 4px;
      margin-bottom: 2px;
    }
    .class-item.is-locked .class-item__desc {
      opacity: 0.5;
    }
    .class-item__meta {
      color: var(--zoo-text-dim);
      font-size: .76rem;
      margin-top: 4px;
    }
    .class-item.is-done .class-item__meta {
      color: #6FBF73;
    }
    .class-item__btn {
      background: rgba(111,191,115,0.15);
      border: 1px solid rgba(111,191,115,0.3);
      color: #6FBF73;
      padding: 6px 11px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      font-size: .74rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .class-item.is-done .class-item__btn {
      background: rgba(213,90,40,0.15);
      border-color: rgba(213,90,40,0.3);
      color: #D55A28;
    }
    .cert-btn-top {
      background: linear-gradient(135deg, #E8A317, #D68A0A);
      color: #1f1d17;
      border: 0;
      padding: 8px 16px;
      border-radius: 100px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: .8rem;
      white-space: nowrap;
    }
    .cert-btn-top--done {
      background: rgba(111,191,115,0.15);
      color: #6FBF73;
      border: 1px solid rgba(111,191,115,0.3);
    }

    @media (max-width: 640px) {
      .player-overlay { padding: 0; align-items: stretch; }
      .player-box {
        max-width: 100%;
        max-height: 100vh;
        height: 100vh;
        border-radius: 0;
        border: 0;
      }
      .player-box__header { padding: 12px 16px; }
      .classes-list-box { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="club-layout">
    <aside class="club-sidebar" id="sidebar"></aside>
    <main class="club-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menú">☰</button>
        <div style="display:flex;gap:10px;align-items:center;margin-left:auto;">
          <button class="notif-icon" id="notifBtn" title="Notificaciones" aria-label="Notificaciones">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></button>
          <button class="theme-toggle" id="themeToggleBtn" title="Cambiar tema" aria-label="Cambiar tema" onclick="GLOBALVET_CLUB.toggleTheme()">☀️</button>
        </div>
      </div>
      <!-- Panel de notificaciones -->
      <div class="notif-panel" id="notifPanel" style="display:none;">
        <div class="notif-panel__header">
          <h3>🔔 Notificaciones</h3>
          <button class="notif-panel__close" id="notifPanelClose" aria-label="Cerrar">✕</button>
        </div>
        <div class="notif-panel__actions" id="notifPanelActions" style="display:none;">
          <button class="notif-mark-all" id="notifMarkAll">Marcar todas como leídas</button>
        </div>
        <div class="notif-panel__list" id="notifList">Cargando...</div>
      </div>
      <div class="page-header">
        <h1>📚 Biblioteca exclusiva</h1>
        <p>Cursos completos seleccionados para miembros VIP · Acceso ilimitado</p>
      </div>
      <div id="lockedNotice"></div>
      <div id="unlockInfo"></div>
      <div class="filter-bar" id="filterBar"></div>
      <div class="course-grid-club" id="coursesGrid">Cargando cursos...</div>
    </main>
  </div>

  <div class="player-overlay" id="playerOverlay">
    <div class="player-box">
      <div class="player-box__header">
        <h3 id="playerTitle">—</h3>
        <button class="player-box__close" onclick="closePlayer()">×</button>
      </div>
      <div class="player-box__video" id="playerVideo"></div>
      <div class="player-box__info"><p id="playerDesc"></p></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/club.js"></script>
  <script>
    (async () => {
      const session = await GLOBALVET_CLUB.requireAuth();
      if (!session) return;
      document.getElementById('sidebar').innerHTML = GLOBALVET_CLUB.renderSidebar('biblioteca', session);
      if (GLOBALVET_CLUB.initTheme) GLOBALVET_CLUB.initTheme();
      if (GLOBALVET_CLUB.initMobileMenu) GLOBALVET_CLUB.initMobileMenu();
      if (GLOBALVET_CLUB.initNotifications) GLOBALVET_CLUB.initNotifications(session);


      if (session.planStatus !== 'active') {
        document.getElementById('lockedNotice').innerHTML = `<div class="status-banner" style="margin-bottom:20px;"><span>🔒</span>Necesitas membresía activa para ver los cursos completos. <a href="club-suscripcion.html" style="color:inherit;text-decoration:underline;margin-left:6px;">Activar $199/mes →</a></div>`;
      }

      const cursos = await GLOBALVET_CLUB.getCursos();
      const grid = document.getElementById('coursesGrid');

      if (cursos.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--zoo-text-dim);background:var(--zoo-bg-card);border-radius:var(--zoo-radius);"><div style="font-size:3rem;margin-bottom:10px;">🦒</div><h3 style="color:#fff;margin-bottom:8px;">Biblioteca en construcción</h3><p>El equipo GlobalVet México está preparando los cursos. Muy pronto tendrás acceso ilimitado.</p></div>`;
        document.getElementById('filterBar').innerHTML = '';
        return;
      }

      const areas = ['Todas', ...new Set(cursos.map(c => c.area).filter(Boolean))];
      const filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = areas.map((a, i) => `<button class="filter-chip-club ${i === 0 ? 'is-active' : ''}" data-area="${a}">${a}</button>`).join('');

      const isActive = session.planStatus === 'active';

      // Cargar progreso de cursos: PRIMERO de Firestore (persistente entre dispositivos),
      // fallback a localStorage si Firestore falla o está vacío
      const progress = await GLOBALVET_CLUB.getCourseProgress(session.uid);
      window.__zooCourseProgress = progress;
      window.__zooSession = session;

      // Convertir URL de Google Drive a URL directa de imagen
      // Soporta varios formatos:
      // - https://drive.google.com/file/d/FILE_ID/view
      // - https://drive.google.com/open?id=FILE_ID
      // - https://drive.google.com/uc?id=FILE_ID
      // - https://drive.google.com/thumbnail?id=FILE_ID
      function convertImageUrl(url) {
        if (!url) return '';
        url = String(url).trim();

        // Ya es URL directa de imagen
        if (!url.includes('drive.google.com')) return url;

        // Extraer FILE_ID de Drive
        let fileId = null;
        const patterns = [
          /\/file\/d\/([a-zA-Z0-9_-]+)/,
          /\/open\?id=([a-zA-Z0-9_-]+)/,
          /[?&]id=([a-zA-Z0-9_-]+)/,
          /\/d\/([a-zA-Z0-9_-]+)/
        ];
        for (const p of patterns) {
          const m = url.match(p);
          if (m) { fileId = m[1]; break; }
        }

        if (!fileId) return url; // No pudo extraer, dejar original

        // Usar endpoint de thumbnail (más confiable para hotlink que uc?export=view)
        return `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
      }
      window.__convertImg = convertImageUrl;

      const render = (filter = 'Todas') => {
        // Ordenar los cursos por fecha de creación (más antiguo primero)
        // para que el desbloqueo sea consistente por orden de alta del admin.
        const cursosOrdenados = GLOBALVET_CLUB.sortForUnlock(cursos);
        const list = filter === 'Todas' ? cursosOrdenados : cursosOrdenados.filter(c => c.area === filter);

        // ═══════════════ DESBLOQUEO PERSONALIZADO — 1 curso cada 8 días ═══════════════
        // Contado desde la fecha de compra (planInicio) de CADA usuario individualmente.
        // Ejemplo: usuario compra el 23-abr → curso 1 ya, curso 2 el 1-may, curso 3 el 9-may.
        const memberSince = session.planInicio || session.createdAt || new Date().toISOString();
        const daysAsMember = Math.floor((Date.now() - new Date(memberSince).getTime()) / (1000 * 60 * 60 * 24));
        const DAYS_PER_UNLOCK = GLOBALVET_CLUB.DAYS_PER_UNLOCK; // 8
        const maxUnlockedIndex = Math.floor(daysAsMember / DAYS_PER_UNLOCK);
        window.__zooMaxUnlocked = maxUnlockedIndex;
        window.__zooDaysAsMember = daysAsMember;

        // Mostrar banner de desbloqueo si es miembro activo y hay cursos aún bloqueados
        const unlockInfo = document.getElementById('unlockInfo');
        if (isActive && list.length > (maxUnlockedIndex + 1)) {
          const nextUnlockIn = Math.max(0, ((maxUnlockedIndex + 1) * DAYS_PER_UNLOCK) - daysAsMember);
          const nextUnlockDate = new Date(new Date(memberSince).getTime() + ((maxUnlockedIndex + 1) * DAYS_PER_UNLOCK * 24 * 60 * 60 * 1000));
          const nextUnlockLabel = GLOBALVET_CLUB.formatUnlockDate(nextUnlockDate);
          unlockInfo.innerHTML = `
            <div class="unlock-schedule-banner">
              <div class="unlock-schedule-banner__icon">🔓</div>
              <div class="unlock-schedule-banner__text">
                Tu ruta VIP personal: <strong>1 curso nuevo cada 8 días</strong> desde tu compra.
                Llevas <strong>${daysAsMember} día${daysAsMember !== 1 ? 's' : ''}</strong> como miembro,
                tienes <strong>${Math.min(list.length, maxUnlockedIndex + 1)}</strong> de ${list.length} cursos disponibles.
                ${nextUnlockIn > 0 ? `El siguiente se desbloquea el <strong>${nextUnlockLabel}</strong> (en ${nextUnlockIn} día${nextUnlockIn !== 1 ? 's' : ''}).` : ''}
              </div>
            </div>`;
        } else {
          unlockInfo.innerHTML = '';
        }

        grid.innerHTML = list.map((c, courseIdx) => {
          const lecciones = (c.lecciones && c.lecciones.length) ? c.lecciones : (c.driveId ? [{titulo: c.title, driveId: c.driveId, duration: c.duration}] : []);
          const totalClases = lecciones.length;
          const hasContent = totalClases > 0;

          const prog = progress[c.id] || { completedLessons: [], isCompleted: false, completedAt: null, certificateFolio: null };
          const completedCount = prog.completedLessons.length;
          const percent = totalClases > 0 ? Math.round((completedCount / totalClases) * 100) : 0;
          const isCertified = prog.isCompleted;

          // Desbloqueo: curso 0 siempre disponible; curso N disponible a partir del día N*8
          const isUnlockedByTime = courseIdx <= maxUnlockedIndex;
          const daysUntilUnlock = Math.max(0, (courseIdx * DAYS_PER_UNLOCK) - daysAsMember);
          // Fecha exacta personalizada (fecha de compra + N*8 días)
          const unlockDateForThisUser = new Date(new Date(memberSince).getTime() + (courseIdx * DAYS_PER_UNLOCK * 24 * 60 * 60 * 1000));
          const unlockDateLabel = GLOBALVET_CLUB.formatUnlockDate(unlockDateForThisUser);

          const imageUrl = convertImageUrl(c.image);

          return `
            <article class="course-card-club ${!isUnlockedByTime && isActive ? 'is-time-locked' : ''}">
              <div class="course-card-club__img">
                ${imageUrl ? `<img src="${imageUrl}" alt="${(c.title || '').replace(/"/g, '&quot;')}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.parentElement.classList.add('no-image');">` : ''}
                <div class="course-card-club__img-placeholder">
                  <span style="font-size:3.5rem;opacity:.3;">🦒</span>
                </div>
                ${c.tag ? `<span class="course-card-club__tag">${c.tag}</span>` : ''}
                ${totalClases > 1 ? `<span class="course-card-club__classes">📹 ${totalClases} clases</span>` : ''}
                ${isCertified ? `<span class="course-card-club__certified">🏆 Certificado</span>` : ''}
                ${!isUnlockedByTime && isActive ? `
                  <div class="course-time-lock">
                    <div class="course-time-lock__icon">🔒</div>
                    <div class="course-time-lock__text">
                      Disponible el<br><strong>${unlockDateLabel}</strong><br>
                      <span style="font-size:.78rem;opacity:.85;">(en ${daysUntilUnlock} día${daysUntilUnlock !== 1 ? 's' : ''})</span>
                    </div>
                  </div>
                ` : ''}
              </div>
              <div class="course-card-club__body">
                <div class="course-card-club__area">${c.area || ''}</div>
                <h3 class="course-card-club__title">${c.title}</h3>
                <p class="course-card-club__desc">${c.description || `Duración: ${c.duration || '—'} · Nivel: ${c.level || '—'}`}</p>

                ${hasContent && completedCount > 0 && isUnlockedByTime ? `
                  <div class="course-progress-wrap">
                    <div class="course-progress-info">
                      <span>${percent}% completado</span>
                      <span>${completedCount}/${totalClases}</span>
                    </div>
                    <div class="course-progress-bar">
                      <div class="course-progress-bar__fill" style="width:${percent}%;"></div>
                    </div>
                  </div>
                ` : ''}

                ${isActive && hasContent && isUnlockedByTime
                  ? `<button class="course-card-club__action" onclick='openCourseDetail(${JSON.stringify({...c, lecciones}).replace(/'/g, "&#39;")})'>${totalClases > 1 ? `▶ Ver ${totalClases} clases` : '▶ Ver curso'}</button>`
                  : isActive && hasContent && !isUnlockedByTime
                  ? `<button class="course-card-club__action course-card-club__action--locked" disabled>🔒 Se desbloquea el ${unlockDateLabel}</button>`
                  : !isActive ? `<a href="club-suscripcion.html" class="course-card-club__action" style="background:var(--zoo-orange);">🔒 Activar membresía</a>`
                  : `<a href="https://wa.me/5212361113237?text=Hola%2C%20soy%20VIP%20y%20quiero%20el%20curso%3A%20${encodeURIComponent(c.title)}" target="_blank" class="course-card-club__action">▶ Solicitar acceso</a>`}

                ${isCertified ? `
                  <button class="course-certificate-btn" onclick='descargarCertificado("${c.id}", ${JSON.stringify(c.title).replace(/'/g, "&#39;")})'>
                    🎓 Descargar certificado
                  </button>
                ` : ''}
              </div>
            </article>
          `;
        }).join('');
      };
      render();

      filterBar.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-chip-club');
        if (!btn) return;
        filterBar.querySelectorAll('.filter-chip-club').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        render(btn.dataset.area);
      });
    })();

    function openCourseDetail(course) {
      const lecciones = course.lecciones || [];
      window.__currentCourse = course;
      window.__currentLecciones = lecciones;

      if (lecciones.length === 1) {
        // Solo 1 clase → abrir player directo
        openPlayer(lecciones[0].driveId, course.title, course.description || '', course.id, 0);
        return;
      }

      // Mostrar lista de clases con estado de completado
      renderCourseModal();
    }

    function renderCourseModal() {
      const course = window.__currentCourse;
      const lecciones = window.__currentLecciones;
      const progress = window.__zooCourseProgress[course.id] || { completedLessons: [], isCompleted: false };
      const completedCount = progress.completedLessons.length;
      const totalClases = lecciones.length;
      const allCompleted = completedCount >= totalClases;

      const modal = document.getElementById('playerOverlay');
      document.getElementById('playerTitle').textContent = course.title;
      document.getElementById('playerVideo').innerHTML = '';
      document.getElementById('playerDesc').textContent = '';

      const box = modal.querySelector('.player-box');
      const oldList = box.querySelector('.classes-list-box');
      if (oldList) oldList.remove();
      box.querySelector('.player-box__video').style.display = 'none';
      box.querySelector('.player-box__info').style.display = 'none';

      // Encontrar el índice de la siguiente clase disponible
      const nextAvailable = lecciones.findIndex((_, i) => !progress.completedLessons.includes(i));

      const listEl = document.createElement('div');
      listEl.className = 'classes-list-box';
      listEl.innerHTML = `
        <div class="classes-list-header">
          <div class="classes-list-title">📚 ${totalClases} clases · ${completedCount}/${totalClases} completadas</div>
          ${allCompleted && !progress.isCompleted ? `<button onclick="generarCertificado('${course.id}')" class="cert-btn-top">🎓 Obtener certificado</button>` : ''}
          ${progress.isCompleted ? `<button onclick='descargarCertificado("${course.id}", ${JSON.stringify(course.title).replace(/'/g, "&#39;")})' class="cert-btn-top cert-btn-top--done">🎓 Ver certificado</button>` : ''}
        </div>
        <div class="classes-progress-bar">
          <div class="classes-progress-bar__fill" style="width:${(completedCount/totalClases*100)}%;"></div>
        </div>
        ${lecciones.map((l, i) => {
          const done = progress.completedLessons.includes(i);
          // Desbloqueada si: es la primera, o la anterior está completada, o esta está completada
          const unlocked = i === 0 || progress.completedLessons.includes(i - 1) || done;
          const isNext = i === nextAvailable;

          // Generar descripción: usa l.descripcion si existe, si no genera una automática
          const descripcion = l.descripcion || l.description || generarDescripcionClase(l.titulo || 'Clase ' + (i+1), i, totalClases);

          return `
            <div class="class-item ${done ? 'is-done' : ''} ${!unlocked ? 'is-locked' : ''} ${isNext ? 'is-next' : ''}">
              <div class="class-item__num">
                ${done ? '✓' : (!unlocked ? '🔒' : i + 1)}
              </div>
              <div class="class-item__body" ${unlocked ? `onclick='openPlayer("${l.driveId}", ${JSON.stringify(l.titulo || "Clase " + (i+1))}, ${JSON.stringify(l.duration || "")}, "${course.id}", ${i})'` : ''}>
                <div class="class-item__title">${l.titulo || 'Clase ' + (i + 1)}</div>
                <div class="class-item__desc">${descripcion}</div>
                <div class="class-item__meta">
                  ${l.duration ? '⏱️ ' + l.duration : ''}
                  ${done ? (l.duration ? ' · ' : '') + '✓ Completada' : ''}
                  ${!unlocked ? '🔒 Completa la clase anterior para desbloquear' : ''}
                  ${isNext && !done && unlocked ? (l.duration ? ' · ' : '') + '▶ Siguiente clase' : ''}
                </div>
              </div>
              ${unlocked ? `
                <button onclick="toggleLessonComplete('${course.id}', ${i})" class="class-item__btn">
                  ${done ? 'Desmarcar' : '✓ Completada'}
                </button>
              ` : ''}
            </div>
          `;
        }).join('')}
      `;
      box.appendChild(listEl);
      modal.classList.add('is-open');
    }

    // Genera una descripción breve y útil basada en el título de la clase
    function generarDescripcionClase(titulo, index, total) {
      const t = (titulo || '').toLowerCase();
      if (index === 0) return 'Introducción, conceptos clave y lo que aprenderás en este curso.';
      if (index === total - 1) return 'Cierre del curso, aplicaciones prácticas y siguientes pasos.';
      // Detectar temas por palabras clave en el título
      if (/introducci|bienvenid|presenta/.test(t)) return 'Conceptos fundamentales y bienvenida al tema.';
      if (/fundamen|bas[ei]|princip/.test(t)) return 'Principios teóricos esenciales antes de ver los casos prácticos.';
      if (/identifica|morfolog|anatom/.test(t)) return 'Cómo identificar características clave en campo.';
      if (/manejo|captur|conteni|inmoviliz/.test(t)) return 'Técnicas y protocolos profesionales de manejo seguro.';
      if (/rehabilita|rescate|atenci/.test(t)) return 'Procedimientos paso a paso desde la recepción hasta la liberación.';
      if (/alimenta|nutric|diet/.test(t)) return 'Requerimientos nutricionales y planes de alimentación.';
      if (/enfermedad|patolog|zoono|sanitar/.test(t)) return 'Principales patologías, diagnóstico y tratamiento.';
      if (/legisla|norm|cites|uma|permiso/.test(t)) return 'Marco legal mexicano vigente y documentación requerida.';
      if (/monitoreo|fototrampeo|telemetr|seguimien/.test(t)) return 'Métodos científicos de monitoreo y análisis de datos.';
      if (/conserva|protecci|amenaz/.test(t)) return 'Estado actual, amenazas y estrategias de conservación.';
      if (/reproducci|cría|crianza/.test(t)) return 'Técnicas de reproducción en cautiverio y manejo de crías.';
      if (/habitat|ecosistem|distribuci/.test(t)) return 'Hábitat natural, distribución geográfica y requerimientos ecológicos.';
      if (/caso|clínico|ejemplo/.test(t)) return 'Caso real paso a paso con diagnóstico y resolución.';
      if (/práctic|ejercici|taller/.test(t)) return 'Práctica guiada para aplicar lo aprendido.';
      if (/primer.*auxil|emergencia/.test(t)) return 'Atención inmediata ante casos de urgencia en campo.';
      return `Contenido clave de la clase ${index + 1}: conceptos, ejemplos y aplicación práctica.`;
    }

    async function toggleLessonComplete(courseId, lessonIdx) {
      const progress = window.__zooCourseProgress;
      if (!progress[courseId]) progress[courseId] = { completedLessons: [], isCompleted: false };

      const idx = progress[courseId].completedLessons.indexOf(lessonIdx);
      if (idx > -1) {
        progress[courseId].completedLessons.splice(idx, 1);
        if (progress[courseId].isCompleted) {
          progress[courseId].isCompleted = false;
        }
      } else {
        progress[courseId].completedLessons.push(lessonIdx);
      }

      // Guardar en Firestore (persistente, sincronizado entre dispositivos)
      await GLOBALVET_CLUB.saveCourseProgress(window.__zooSession.uid, progress);
      renderCourseModal();
    }
    window.toggleLessonComplete = toggleLessonComplete;

    async function generarCertificado(courseId) {
      const progress = window.__zooCourseProgress;
      if (!progress[courseId]) return;

      const btn = event?.target;
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Verificando...'; }

      try {
        // ═══ ANTI-DUPLICADOS ═══
        // Buscar si YA existe un certificado para este curso y usuario
        const existing = await db.collection('certificados')
          .where('memberUid', '==', window.__zooSession.uid)
          .where('courseId', '==', String(courseId))
          .limit(1)
          .get();

        if (!existing.empty) {
          // Ya existe, abrir el que ya existe
          const existingData = existing.docs[0].data();
          console.log('ℹ️ Ya existe certificado para este curso:', existingData.folio);

          progress[courseId].isCompleted = true;
          progress[courseId].completedAt = existingData.issuedAt;
          progress[courseId].certificateFolio = existingData.folio;
          await GLOBALVET_CLUB.saveCourseProgress(window.__zooSession.uid, progress);

          closePlayer();
          setTimeout(() => {
            window.open(`ver-certificado.html?folio=${existingData.folio}`, '_blank');
            setTimeout(() => window.location.reload(), 800);
          }, 300);
          return;
        }

        // ═══ NO EXISTE, CREAR NUEVO ═══
        if (btn) btn.textContent = '⏳ Generando...';
        const year = new Date().getFullYear();
        const random = Math.floor(Math.random() * 90000) + 10000;
        const folio = `ZOO-${year}-${random}`;

        const certData = {
          folio,
          courseId: String(courseId),
          courseTitle: window.__currentCourse.title || 'Curso GlobalVet México',
          courseArea: window.__currentCourse.area || 'General',
          courseDuration: window.__currentCourse.duration || '',
          memberUid: window.__zooSession.uid,
          memberName: window.__zooSession.name || window.__zooSession.email || 'Miembro VIP',
          memberEmail: window.__zooSession.email || '',
          issuedAt: new Date().toISOString(),
          totalClases: window.__currentLecciones.length
        };

        console.log('💾 Guardando certificado:', folio, certData);
        await db.collection('certificados').doc(folio).set(certData);
        console.log('✅ Certificado guardado en Firestore');

        progress[courseId].isCompleted = true;
        progress[courseId].completedAt = new Date().toISOString();
        progress[courseId].certificateFolio = folio;
        await GLOBALVET_CLUB.saveCourseProgress(window.__zooSession.uid, progress);

        if (window.GLOBALVET_CLUB && GLOBALVET_CLUB.awardAchievement) {
          GLOBALVET_CLUB.awardAchievement(window.__zooSession.uid, 'first_course');
        }

        closePlayer();
        setTimeout(() => {
          window.open(`ver-certificado.html?folio=${folio}`, '_blank');
          setTimeout(() => window.location.reload(), 800);
        }, 300);

      } catch (err) {
        console.error('❌ Error generando certificado:', err);
        if (btn) { btn.disabled = false; btn.textContent = '🎓 Obtener certificado'; }

        // Mensaje útil según el error real (NO decir "membresía no activa" si no es el caso)
        let mensaje = '❌ No se pudo generar el certificado.\n\n';
        if (err.code === 'permission-denied' || (err.message || '').toLowerCase().includes('permission')) {
          mensaje += '⚠️ Error de permisos en Firestore.\n\nSoluciones:\n';
          mensaje += '1. Actualiza las reglas de Firestore en Firebase Console\n';
          mensaje += '2. Usa la herramienta de diagnóstico en /pages/diagnostico.html\n';
          mensaje += '3. Contacta a soporte por WhatsApp';
        } else if (err.code === 'unavailable' || (err.message || '').includes('network')) {
          mensaje += 'Sin conexión a internet. Revisa tu conexión e inténtalo de nuevo.';
        } else {
          mensaje += 'Detalles técnicos:\n' + (err.message || err.code || 'Error desconocido');
          mensaje += '\n\nSi el problema persiste, contacta a soporte.';
        }
        alert(mensaje);
      }
    }

    function descargarCertificado(courseId, courseTitle) {
      const progress = window.__zooCourseProgress[courseId];
      if (!progress || !progress.certificateFolio) {
        alert('No se encontró el folio del certificado. Intenta generar uno nuevo.');
        return;
      }
      window.open(`ver-certificado.html?folio=${progress.certificateFolio}`, '_blank');
    }

    function openPlayer(driveId, title, desc, courseId, lessonIdx) {
      const modal = document.getElementById('playerOverlay');
      const box = modal.querySelector('.player-box');

      const oldList = box.querySelector('.classes-list-box');
      if (oldList) oldList.remove();

      box.querySelector('.player-box__video').style.display = '';
      box.querySelector('.player-box__info').style.display = '';

      document.getElementById('playerTitle').textContent = title;

      // Info del player con detalle + botón volver a lista
      const descDiv = document.getElementById('playerDesc');
      descDiv.innerHTML = '';

      const infoContent = document.createElement('div');
      infoContent.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;';
      infoContent.innerHTML = `
        <span style="color:var(--zoo-text-muted);font-size:.88rem;">
          ${desc ? '⏱️ ' + desc : ''}
          ${courseId !== undefined && lessonIdx !== undefined ? `${desc ? ' · ' : ''}Clase ${lessonIdx + 1} de ${window.__currentLecciones?.length || 1}` : ''}
        </span>
        ${courseId !== undefined && window.__currentLecciones?.length > 1 ? `
          <div style="display:flex;gap:8px;">
            <button onclick="renderCourseModal()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:7px 14px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;font-size:.8rem;">
              ← Lista de clases
            </button>
            <button onclick="marcarYSiguiente('${courseId}', ${lessonIdx})" style="background:linear-gradient(135deg,#6FBF73,#3d8b42);border:0;color:#fff;padding:7px 14px;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.8rem;">
              ✓ Completada, siguiente →
            </button>
          </div>
        ` : ''}
      `;
      descDiv.appendChild(infoContent);

      document.getElementById('playerVideo').innerHTML = `<iframe src="https://drive.google.com/file/d/${driveId}/preview" allow="autoplay" allowfullscreen></iframe>`;
      modal.classList.add('is-open');

      if (courseId !== undefined && lessonIdx !== undefined) {
        clearTimeout(window.__autoCompleteTimer);
        window.__autoCompleteTimer = setTimeout(async () => {
          const progress = window.__zooCourseProgress;
          if (!progress[courseId]) progress[courseId] = { completedLessons: [], isCompleted: false };
          if (!progress[courseId].completedLessons.includes(lessonIdx)) {
            progress[courseId].completedLessons.push(lessonIdx);
            await GLOBALVET_CLUB.saveCourseProgress(window.__zooSession.uid, progress);
          }
        }, 30000);
      }
    }

    async function marcarYSiguiente(courseId, lessonIdx) {
      const progress = window.__zooCourseProgress;
      if (!progress[courseId]) progress[courseId] = { completedLessons: [], isCompleted: false };

      if (!progress[courseId].completedLessons.includes(lessonIdx)) {
        progress[courseId].completedLessons.push(lessonIdx);
        await GLOBALVET_CLUB.saveCourseProgress(window.__zooSession.uid, progress);
      }

      const lecciones = window.__currentLecciones;
      const nextIdx = lessonIdx + 1;

      if (nextIdx < lecciones.length) {
        // Abrir siguiente clase
        const l = lecciones[nextIdx];
        openPlayer(l.driveId, l.titulo || 'Clase ' + (nextIdx + 1), l.duration || '', courseId, nextIdx);
      } else {
        // Era la última — volver a lista para mostrar botón de certificado
        renderCourseModal();
      }
    }
    function closePlayer() {
      const modal = document.getElementById('playerOverlay');
      modal.classList.remove('is-open');
      document.getElementById('playerVideo').innerHTML = '';
      // Limpiar lista de clases si existe
      const oldList = modal.querySelector('.classes-list-box');
      if (oldList) oldList.remove();
      // Restaurar display del video y info para la próxima
      modal.querySelector('.player-box__video').style.display = '';
      modal.querySelector('.player-box__info').style.display = '';
    }
    document.getElementById('playerOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'playerOverlay') closePlayer();
    });
  </script>
