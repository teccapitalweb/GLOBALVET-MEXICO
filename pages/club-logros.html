<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logros · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .logro-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1.3rem;text-align:center;transition:transform .15s}
  .logro-card.locked{opacity:.4;filter:grayscale(1)}
  .logro-card:hover:not(.locked){transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
  .logro-icon{font-size:3rem;margin-bottom:.6rem}
  .logro-title{font-family:var(--ff);font-size:1rem;font-weight:700;margin-bottom:.3rem}
  .logro-desc{font-size:.82rem;color:var(--muted);margin-bottom:.5rem}
  .logro-status{font-size:.72rem;font-weight:700;padding:.25rem .6rem;border-radius:20px;display:inline-block}
  .logro-status.ok{background:#d1fae5;color:#065f46}
  .logro-status.no{background:var(--bg);color:var(--muted)}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.8rem}
  .stat-box{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:1.1rem;text-align:center}
  .stat-num{font-family:var(--ff);font-size:1.8rem;font-weight:700;color:var(--purple);line-height:1}
  .stat-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.3rem}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>⭐ Mis logros</h1>
      <p>Desbloquea badges conforme avanzas en tu aprendizaje veterinario</p>
    </div>
    <div class="stats-row" id="stats"></div>
    <div id="content" class="card-grid"></div>
  </main>
</div>
<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, getDiasDesdeRegistro } from '../assets/js/club-extra.js';
(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('logros');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  const dias   = getDiasDesdeRegistro(session);
  const cursos = (session.pd.cursosCompletados || []).length;
  const racha  = session.pd.racha || 0;
  const nivel  = Math.min(10, 1 + Math.floor(cursos / 2));

  // Stats principales
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${nivel}</div><div class="stat-label">Nivel</div></div>
    <div class="stat-box"><div class="stat-num">${cursos}</div><div class="stat-label">Cursos completos</div></div>
    <div class="stat-box"><div class="stat-num">${racha}</div><div class="stat-label">Días de racha</div></div>
    <div class="stat-box"><div class="stat-num">${dias}</div><div class="stat-label">Días como miembro</div></div>`;

  // Catálogo de logros (desbloqueables por condiciones)
  const logros = [
    { icon:'🎯', title:'Primer paso',      desc:'Completa tu primer curso',                  unlocked: cursos >= 1 },
    { icon:'📚', title:'Lector voraz',     desc:'Completa 3 cursos en total',                unlocked: cursos >= 3 },
    { icon:'🏆', title:'Veterinario pro',  desc:'Completa 5 cursos en total',                unlocked: cursos >= 5 },
    { icon:'🔥', title:'Racha de 7',       desc:'Conecta 7 días seguidos',                   unlocked: racha >= 7 },
    { icon:'🌟', title:'Racha de 30',      desc:'Conecta 30 días seguidos',                  unlocked: racha >= 30 },
    { icon:'📅', title:'Fiel al Club',     desc:'30 días como miembro',                      unlocked: dias >= 30 },
    { icon:'💎', title:'Miembro VIP gold', desc:'90 días como miembro',                      unlocked: dias >= 90 },
    { icon:'🎓', title:'Nivel 5',          desc:'Alcanza el nivel 5',                        unlocked: nivel >= 5 },
    { icon:'🦾', title:'Nivel 10',         desc:'Alcanza el nivel máximo',                   unlocked: nivel >= 10 },
    { icon:'🤝', title:'Embajador',        desc:'Invita 3 amigos con tu link de referidos',  unlocked: (session.pd.referidos || 0) >= 3 },
    { icon:'🎥', title:'Maratón de videos',desc:'Mira 10 videos del club',                   unlocked: (session.pd.videosVistos || 0) >= 10 },
    { icon:'📄', title:'Biblioteca activa',desc:'Descarga 5 PDFs clínicos',                  unlocked: (session.pd.pdfsDescargados || 0) >= 5 }
  ];

  document.getElementById('content').innerHTML = logros.map(l => `
    <div class="logro-card ${l.unlocked ? '' : 'locked'}">
      <div class="logro-icon">${l.icon}</div>
      <div class="logro-title">${l.title}</div>
      <div class="logro-desc">${l.desc}</div>
      <div class="logro-status ${l.unlocked ? 'ok' : 'no'}">${l.unlocked ? '✓ Desbloqueado' : '🔒 Bloqueado'}</div>
    </div>`).join('');
})();
</script>
</body>
</html>
