<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logros · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .badges-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }
  .badge-card {
    background: var(--gv-bg-surface);
    border: 1.5px solid var(--gv-border);
    border-radius: var(--gv-radius);
    padding: 1.4rem;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .badge-card.unlocked {
    border-color: var(--gv-border-gold);
    background:
      radial-gradient(ellipse 180px 120px at 50% 0%, rgba(245, 158, 11, 0.12), transparent 60%),
      var(--gv-bg-surface);
  }
  .badge-card.unlocked:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(245, 158, 11, 0.2);
  }
  .badge-card.locked { opacity: 0.4; filter: grayscale(0.8); }

  .badge-emoji {
    font-size: 3.5rem;
    line-height: 1;
    margin-bottom: 0.8rem;
    filter: drop-shadow(0 4px 10px rgba(245, 158, 11, 0.3));
  }
  .badge-card.locked .badge-emoji { filter: none; }
  .badge-name {
    font-family: var(--gv-ff);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .badge-desc {
    font-size: 0.82rem;
    color: var(--gv-text-muted);
    line-height: 1.5;
    margin-bottom: 0.6rem;
  }
  .badge-status {
    font-family: var(--gv-ff);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.8rem;
    border-radius: 50px;
    display: inline-block;
  }
  .badge-status.unlocked {
    background: linear-gradient(135deg, var(--gv-gold), var(--gv-gold-deep));
    color: #1a0f04;
  }
  .badge-status.locked {
    background: rgba(255,255,255,0.05);
    color: var(--gv-text-dim);
    border: 1px solid var(--gv-border);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-box {
    background: var(--gv-bg-surface);
    border: 1px solid var(--gv-border);
    border-radius: var(--gv-radius);
    padding: 1.3rem 1.4rem;
    text-align: center;
  }
  .stat-box-icon { font-size: 1.8rem; margin-bottom: 0.4rem; display: block; }
  .stat-box-num {
    font-family: var(--gv-ff);
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--gv-gold);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .stat-box-label {
    font-size: 0.76rem;
    color: var(--gv-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">

    <div class="hero-banner">
      <div class="hero-badge">⭐ Sistema de logros</div>
      <h2>Tus logros desbloqueados</h2>
      <p>Completa cursos, participa en el foro, refiere colegas y desbloquea reconocimientos. Cada logro es una insignia permanente de tu progreso.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-box-icon">🎯</span>
        <div class="stat-box-num" id="statNivel">1</div>
        <div class="stat-box-label">Nivel</div>
      </div>
      <div class="stat-box">
        <span class="stat-box-icon">🏆</span>
        <div class="stat-box-num" id="statLogros">0</div>
        <div class="stat-box-label">Logros</div>
      </div>
      <div class="stat-box">
        <span class="stat-box-icon">🔥</span>
        <div class="stat-box-num" id="statRacha">0</div>
        <div class="stat-box-label">Racha (días)</div>
      </div>
      <div class="stat-box">
        <span class="stat-box-icon">📅</span>
        <div class="stat-box-num" id="statDias">0</div>
        <div class="stat-box-label">Días en el club</div>
      </div>
    </div>

    <div class="badges-grid" id="badges"></div>
  </main>
</div>

<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, getDiasDesdeRegistro } from '../assets/js/club-extra.js';

const BADGES = [
  { id:'welcome', emoji:'🎉', name:'Bienvenido al Club', desc:'Primer inicio de sesión en el Club VIP', condition: (d) => d >= 1 },
  { id:'primer-curso', emoji:'📚', name:'Primer curso', desc:'Acceder al primer curso desbloqueado', condition: (d) => d >= 1 },
  { id:'explorador', emoji:'🧭', name:'Explorador', desc:'Visitar 5 secciones del Club', condition: (d) => d >= 3 },
  { id:'semana-1', emoji:'🗓️', name:'Una semana', desc:'Mantenerse activo 7 días', condition: (d) => d >= 7 },
  { id:'dos-cursos', emoji:'📖', name:'Doble curso', desc:'Desbloquear 2 cursos (16 días)', condition: (d) => d >= 16 },
  { id:'mes-1', emoji:'🌙', name:'Un mes VIP', desc:'30 días como miembro del Club', condition: (d) => d >= 30 },
  { id:'herramientas-pro', emoji:'🩺', name:'Veterinario digital', desc:'Usar las herramientas clínicas 10+ veces', condition: (d) => d >= 7 },
  { id:'forero', emoji:'💬', name:'Forero activo', desc:'Publicar en el foro por primera vez', condition: () => false },
  { id:'referidor', emoji:'🎁', name:'Primer referido', desc:'Invitar a un colega al Club', condition: () => false },
  { id:'certificado', emoji:'🏆', name:'Primera constancia', desc:'Obtener la primera constancia oficial', condition: () => false },
  { id:'tres-meses', emoji:'💎', name:'Miembro constante', desc:'90 días en el Club', condition: (d) => d >= 90 },
  { id:'master', emoji:'👑', name:'Master GlobalVet', desc:'Completar todos los cursos (180+ días)', condition: (d) => d >= 180 }
];

(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('logros');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  const dias = getDiasDesdeRegistro(session);
  const unlocked = BADGES.filter(b => b.condition(dias));
  const nivel = Math.floor(unlocked.length / 3) + 1;

  document.getElementById('statNivel').textContent = nivel;
  document.getElementById('statLogros').textContent = `${unlocked.length}/${BADGES.length}`;
  document.getElementById('statRacha').textContent = Math.min(dias, 7);
  document.getElementById('statDias').textContent = dias;

  document.getElementById('badges').innerHTML = BADGES.map(b => {
    const gotIt = b.condition(dias);
    return `
      <div class="badge-card ${gotIt ? 'unlocked' : 'locked'}">
        <div class="badge-emoji">${b.emoji}</div>
        <div class="badge-name">${b.name}</div>
        <div class="badge-desc">${b.desc}</div>
        <span class="badge-status ${gotIt ? 'unlocked' : 'locked'}">
          ${gotIt ? '✓ Desbloqueado' : '🔒 Bloqueado'}
        </span>
      </div>`;
  }).join('');
})();
</script>
</body>
</html>
