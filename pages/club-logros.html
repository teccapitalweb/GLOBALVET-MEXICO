<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis logros · Club VIP GlobalVet</title>
  <meta name="theme-color" content="#1F5F3A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/club.css">
  <link rel="stylesheet" href="../assets/css/club-mobile.css">
  <link rel="stylesheet" href="../assets/css/club-theme.css">
  <style>
    /* Hero con XP y nivel */
    .ach-hero {
      background: linear-gradient(135deg, rgba(31,95,58,0.15) 0%, rgba(232,163,23,0.1) 100%);
      border: 1px solid rgba(232,163,23,0.3);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 24px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .ach-hero::before {
      content: '🏆';
      position: absolute;
      font-size: 9rem;
      right: -20px;
      top: -20px;
      opacity: 0.06;
      pointer-events: none;
    }
    .ach-hero__level {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8A317, #D68A0A);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #1f1d17;
      box-shadow: 0 10px 30px rgba(232,163,23,0.35);
      position: relative;
      animation: rotateGlow 4s linear infinite;
    }
    @keyframes rotateGlow {
      0%, 100% { box-shadow: 0 10px 30px rgba(232,163,23,0.35); }
      50% { box-shadow: 0 10px 40px rgba(232,163,23,0.6); }
    }
    .ach-hero__level-icon { font-size: 2.4rem; line-height: 1; }
    .ach-hero__level-num { font-size: .68rem; font-weight: 800; letter-spacing: .1em; margin-top: 2px; text-transform: uppercase; }
    .ach-hero__info h1 {
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      margin: 0 0 4px;
      font-weight: 700;
    }
    .ach-hero__info p {
      color: var(--zoo-text-muted, #a0a8a4);
      font-size: .94rem;
      margin: 0 0 14px;
    }
    .ach-hero__bar {
      height: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .ach-hero__bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #E8A317, #6FBF73);
      border-radius: 100px;
      transition: width 1s ease-out;
      box-shadow: 0 0 12px rgba(232,163,23,0.5);
    }
    .ach-hero__bar-info {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      color: var(--zoo-text-muted);
    }
    .ach-hero__bar-info strong { color: var(--zoo-amber, #E8A317); }
    .ach-hero__stats {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: right;
    }
    .ach-hero__stat {
      background: rgba(0,0,0,0.25);
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 130px;
    }
    .ach-hero__stat-val {
      color: var(--zoo-amber);
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
    }
    .ach-hero__stat-lbl {
      color: var(--zoo-text-muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 3px;
    }

    /* Pestañas de categorías */
    .ach-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .ach-tab {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      padding: 8px 16px;
      border-radius: 100px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      font-size: .86rem;
      transition: all .15s;
    }
    .ach-tab:hover { background: rgba(232,163,23,0.1); border-color: rgba(232,163,23,0.3); }
    .ach-tab.is-active {
      background: linear-gradient(135deg, #E8A317, #D68A0A);
      color: #1f1d17;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(232,163,23,0.3);
    }

    /* Grid de logros */
    .ach-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .ach-card {
      background: var(--zoo-bg-card, #131816);
      border: 1px solid var(--zoo-border, #1e2522);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: all .25s;
      animation: fadeUp .5s ease-out both;
      animation-delay: calc(var(--i, 0) * 40ms);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ach-card--locked {
      opacity: 0.4;
      filter: grayscale(0.8);
    }
    .ach-card--locked .ach-card__icon {
      background: linear-gradient(135deg, #3a3a3a, #222);
    }

    .ach-card--unlocked {
      border-color: rgba(232,163,23,0.4);
      background: linear-gradient(180deg, rgba(232,163,23,0.06) 0%, var(--zoo-bg-card) 100%);
    }
    .ach-card--unlocked:hover {
      transform: translateY(-4px);
      border-color: var(--zoo-amber);
      box-shadow: 0 10px 30px rgba(232,163,23,0.2);
    }

    .ach-card--secret {
      border: 1px dashed rgba(232,163,23,0.3);
      background: rgba(232,163,23,0.02);
    }
    .ach-card--secret .ach-card__icon {
      background: linear-gradient(135deg, #222, #111);
      color: rgba(232,163,23,0.5);
    }
    .ach-card--secret .ach-card__name {
      color: var(--zoo-text-muted, #a0a8a4);
      font-style: italic;
    }

    .ach-card__icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8A317, #D68A0A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 12px;
      box-shadow: 0 6px 18px rgba(232,163,23,0.3);
    }
    .ach-card--locked .ach-card__icon {
      font-size: 1.8rem;
      box-shadow: none;
    }
    .ach-card__name {
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .ach-card__desc {
      color: var(--zoo-text-muted, #a0a8a4);
      font-size: .78rem;
      line-height: 1.4;
      margin-bottom: 10px;
      min-height: 2.4em;
    }
    .ach-card__xp {
      display: inline-block;
      background: rgba(232,163,23,0.12);
      border: 1px solid rgba(232,163,23,0.3);
      color: var(--zoo-amber, #E8A317);
      padding: 3px 10px;
      border-radius: 100px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .ach-card__badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #6FBF73, #3d8b42);
      color: #fff;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .06em;
    }

    /* Confetti al desbloquear */
    .ach-confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }
    .ach-confetti span {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      animation: fall 3s linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(calc(100vh + 20px)) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 640px) {
      .ach-hero { grid-template-columns: 1fr; text-align: center; }
      .ach-hero__stats { flex-direction: row; justify-content: center; }
      .ach-hero__stat { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="club-layout">
    <aside class="club-sidebar" id="sidebar"></aside>
    <main class="club-main">
      <div class="club-main__header">
        <div class="club-main__greeting">
          <h1>🏆 Mis logros</h1>
          <p class="date">Desbloquea medallas, gana XP y sube de nivel</p>
        </div>
      </div>

      <div id="logrosContent">Cargando...</div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/club.js"></script>
  <script>
    (async () => {
      const session = await GLOBALVET_CLUB.requireAuth();
      if (!session) return;
      document.getElementById('sidebar').innerHTML = GLOBALVET_CLUB.renderSidebar('logros', session);
      if (GLOBALVET_CLUB.initTheme) GLOBALVET_CLUB.initTheme();
      if (GLOBALVET_CLUB.initMobileMenu) GLOBALVET_CLUB.initMobileMenu();
      if (GLOBALVET_CLUB.initNotifications) GLOBALVET_CLUB.initNotifications(session);


      const progress = GLOBALVET_CLUB.getProgress(session);
      const achievements = GLOBALVET_CLUB.ACHIEVEMENTS;
      // FIX: el campo correcto es unlockedAchievements, no achievements
      const unlocked = new Set(progress.unlockedAchievements || progress.achievements || []);

      const totalUnlocked = Array.from(unlocked).filter(id => achievements.some(a => a.id === id)).length;
      const totalXpEarned = achievements.filter(a => unlocked.has(a.id)).reduce((sum, a) => sum + a.xp, 0);

      // Categorías únicas
      const categorias = {
        'todos':         { emoji: '🏆', label: 'Todos' },
        'inicio':        { emoji: '🚪', label: 'Inicio' },
        'cursos':        { emoji: '📚', label: 'Cursos' },
        'sesiones':      { emoji: '🎥', label: 'Sesiones' },
        'rachas':        { emoji: '🔥', label: 'Rachas' },
        'comunidad':     { emoji: '💬', label: 'Comunidad' },
        'contenido':     { emoji: '📖', label: 'Contenido' },
        'certificados':  { emoji: '🎓', label: 'Certificados' },
        'secretos':      { emoji: '🔮', label: 'Secretos' }
      };

      const content = document.getElementById('logrosContent');
      const nivel = progress.level || { level: 1, name: 'Aprendiz', icon: '🌱', minXP: 0 };
      const xpTotal = progress.xp || 0;
      const progPct = progress.progressPercent || 0;
      const xpToNext = progress.xpToNext || 100;

      content.innerHTML = `
        <div class="ach-hero">
          <div class="ach-hero__level">
            <div class="ach-hero__level-icon">${nivel.icon}</div>
            <div class="ach-hero__level-num">Nv ${nivel.level}</div>
          </div>
          <div class="ach-hero__info">
            <h1>${nivel.name}</h1>
            <p>Sigue completando logros para subir de nivel y desbloquear recompensas</p>
            <div class="ach-hero__bar">
              <div class="ach-hero__bar-fill" style="width:0%" id="xpBar"></div>
            </div>
            <div class="ach-hero__bar-info">
              <span><strong>${xpTotal} XP</strong> total</span>
              <span>${xpToNext} XP para Nv ${(nivel.level || 1) + 1}</span>
            </div>
          </div>
          <div class="ach-hero__stats">
            <div class="ach-hero__stat">
              <div class="ach-hero__stat-val">${totalUnlocked}/${achievements.length}</div>
              <div class="ach-hero__stat-lbl">Logros</div>
            </div>
            <div class="ach-hero__stat">
              <div class="ach-hero__stat-val">${totalXpEarned}</div>
              <div class="ach-hero__stat-lbl">XP ganado</div>
            </div>
          </div>
        </div>

        <div class="ach-tabs" id="tabs">
          ${Object.entries(categorias).map(([key, cat]) => {
            const count = key === 'todos'
              ? achievements.length
              : achievements.filter(a => a.category === key).length;
            const done = key === 'todos'
              ? totalUnlocked
              : achievements.filter(a => a.category === key && unlocked.has(a.id)).length;
            return `<button class="ach-tab ${key === 'todos' ? 'is-active' : ''}" data-cat="${key}">${cat.emoji} ${cat.label} <span style="opacity:.7;margin-left:4px;">${done}/${count}</span></button>`;
          }).join('')}
        </div>

        <div class="ach-grid" id="grid"></div>
      `;

      // Animar barra de XP
      setTimeout(() => {
        document.getElementById('xpBar').style.width = progPct + '%';
      }, 200);

      function renderGrid(filter = 'todos') {
        const list = filter === 'todos'
          ? achievements
          : achievements.filter(a => a.category === filter);

        document.getElementById('grid').innerHTML = list.map((a, i) => {
          const isUnlocked = unlocked.has(a.id);
          const isSecret = a.secret && !isUnlocked;
          const clase = isUnlocked ? 'ach-card--unlocked' : (isSecret ? 'ach-card--secret ach-card--locked' : 'ach-card--locked');

          return `
            <div class="ach-card ${clase}" style="--i:${i}">
              ${isUnlocked ? '<span class="ach-card__badge">✓ DESBLOQUEADO</span>' : ''}
              <div class="ach-card__icon">${isSecret ? '?' : a.icon}</div>
              <div class="ach-card__name">${isSecret ? 'Logro secreto' : a.name}</div>
              <div class="ach-card__desc">${isSecret ? 'Sigue explorando para descubrirlo...' : a.desc}</div>
              <div class="ach-card__xp">+${a.xp} XP</div>
            </div>
          `;
        }).join('');
      }

      renderGrid();

      // Pestañas
      document.getElementById('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.ach-tab');
        if (!btn) return;
        document.querySelectorAll('.ach-tab').forEach(t => t.classList.remove('is-active'));
        btn.classList.add('is-active');
        renderGrid(btn.dataset.cat);
      });
    })();
  </script>
</body>
</html>
