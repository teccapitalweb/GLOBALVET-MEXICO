<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  body{background:linear-gradient(135deg,var(--dark) 0%,var(--purple) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .login-wrap{max-width:420px;width:100%;background:var(--surface);border-radius:18px;padding:2.2rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-head{text-align:center;margin-bottom:1.8rem}
  .login-head img{width:56px;height:56px;border-radius:14px;margin-bottom:.8rem}
  .login-head h1{font-family:var(--ff);font-size:1.4rem;font-weight:700;color:var(--dark);margin-bottom:.3rem}
  .login-head p{color:var(--muted);font-size:.9rem}
  .login-footer{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--muted)}
  .login-footer a{color:var(--purple);font-weight:700}
  .err-box{background:#fee;color:var(--red);padding:.7rem .9rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
  .err-box.show{display:block}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-head">
    <img src="../assets/logo/globalvet-logo.jpg" alt="GlobalVet">
    <h1>Iniciar sesión</h1>
    <p>Entra a tu área VIP de GlobalVet México</p>
  </div>
  <div id="errBox" class="err-box"></div>
  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tunombre@correo.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn btn-primary btn-block" id="btnLogin" style="margin-top:.5rem;">Entrar</button>
  <div style="text-align:center;margin:1rem 0;color:var(--muted);font-size:.78rem;">— o —</div>
  <button class="btn btn-outline btn-block" id="btnGoogle">Continuar con Google</button>
  <div class="login-footer">
    ¿Aún no eres miembro? <a href="club-registro.html">Únete al Club VIP</a><br>
    <a href="#" id="btnReset" style="font-size:.78rem;color:var(--muted);">¿Olvidaste tu contraseña?</a>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg = {
  apiKey:"AIzaSyB_OgAmyW7XNiLUyKp6Ih92A5qxm3LNCqg",
  authDomain:"globalvet-club.firebaseapp.com",
  projectId:"globalvet-club",
  storageBucket:"globalvet-club.firebasestorage.app",
  messagingSenderId:"880780506385",
  appId:"1:880780506385:web:be49dbc8886147a79048b0"
};
const app = initializeApp(cfg);
const auth = getAuth(app);

const errBox = document.getElementById('errBox');
function showErr(msg) { errBox.textContent = msg; errBox.classList.add('show'); }

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if (!email || !pass) { showErr('Completa correo y contraseña'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'club-dashboard.html';
  } catch (err) {
    const map = {
      'auth/invalid-credential':'Correo o contraseña incorrectos',
      'auth/user-not-found':'No existe una cuenta con ese correo',
      'auth/wrong-password':'Contraseña incorrecta',
      'auth/too-many-requests':'Demasiados intentos. Intenta más tarde.'
    };
    showErr(map[err.code] || 'No se pudo iniciar sesión');
  }
});

document.getElementById('btnGoogle').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
    window.location.href = 'club-dashboard.html';
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') showErr('No se pudo iniciar con Google');
  }
});

document.getElementById('btnReset').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showErr('Escribe tu correo arriba y vuelve a hacer clic'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    errBox.style.background = '#d1fae5';
    errBox.style.color = '#065f46';
    showErr('Te enviamos un correo para restablecer tu contraseña');
  } catch (err) {
    showErr('No pudimos enviar el correo');
  }
});

// Enter submits
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});
</script>
</body>
</html>
