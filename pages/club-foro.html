<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foro · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .forum-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
  .post-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1.2rem;margin-bottom:1rem;transition:transform .15s}
  .post-item:hover{transform:translateY(-1px)}
  .post-head{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem}
  .post-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--ff);font-size:.8rem;font-weight:700;flex-shrink:0}
  .post-author{font-family:var(--ff);font-size:.88rem;font-weight:700}
  .post-date{font-size:.72rem;color:var(--muted)}
  .post-title{font-family:var(--ff);font-size:1.05rem;font-weight:700;margin-bottom:.4rem;color:var(--dark)}
  .post-body{font-size:.9rem;color:#374151;line-height:1.6;margin-bottom:.7rem}
  .post-meta{display:flex;gap:1rem;font-size:.78rem;color:var(--muted);padding-top:.7rem;border-top:1px solid var(--line)}
  .post-tag{background:var(--plight);color:var(--purple);padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:700}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:1.8rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
  .modal h3{font-family:var(--ff);margin-bottom:1rem}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>💬 Foro de la comunidad</h1>
      <p>Consulta casos clínicos, comparte experiencias con otros veterinarios del Club</p>
    </div>
    <div class="forum-toolbar">
      <div style="font-size:.88rem;color:var(--muted);" id="postCount">—</div>
      <button class="btn btn-primary" id="btnNew">+ Nueva publicación</button>
    </div>
    <div id="content" class="loading">Cargando foro…</div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Nueva publicación</h3>
    <div class="field">
      <label>Título</label>
      <input type="text" id="pTitle" placeholder="Ej: Caso clínico de cachorro con anemia">
    </div>
    <div class="field">
      <label>Categoría</label>
      <select id="pTag">
        <option>Caso clínico</option>
        <option>Pregunta</option>
        <option>Experiencia</option>
        <option>Recurso compartido</option>
      </select>
    </div>
    <div class="field">
      <label>Contenido</label>
      <textarea id="pBody" rows="6" placeholder="Describe el caso o tu pregunta…"></textarea>
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="document.getElementById('modal').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary" id="btnPublish">Publicar</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, toast, db, collection, query, orderBy, getDocs, addDoc, serverTimestamp } from '../assets/js/club-extra.js';

let session;
const getInitials = n => (n||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

async function loadPosts() {
  const content = document.getElementById('content');
  content.classList.add('loading');
  let posts = [];
  try {
    const snap = await getDocs(query(collection(db, 'foro'), orderBy('createdAt', 'desc')));
    posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (err) { console.log(err.message); }

  content.classList.remove('loading');
  document.getElementById('postCount').textContent = `${posts.length} publicación${posts.length !== 1 ? 'es' : ''}`;

  if (posts.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💬</div>
        <h3 style="font-family:var(--ff);color:var(--dark);margin-bottom:.5rem;">Sé el primero en publicar</h3>
        <p>Comparte un caso clínico, haz una pregunta o cuéntanos una experiencia con pacientes.</p>
      </div>`;
    return;
  }

  content.innerHTML = posts.map(p => {
    const fecha = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('es-MX') : '';
    return `
      <div class="post-item">
        <div class="post-head">
          <div class="post-avatar">${getInitials(p.autor)}</div>
          <div>
            <div class="post-author">${p.autor || 'Miembro VIP'}</div>
            <div class="post-date">${fecha}</div>
          </div>
          ${p.tag ? `<span class="post-tag" style="margin-left:auto;">${p.tag}</span>` : ''}
        </div>
        <h3 class="post-title">${p.titulo}</h3>
        <div class="post-body">${(p.body || '').replace(/\n/g,'<br>')}</div>
        <div class="post-meta">
          <span>👁️ ${p.views || 0}</span>
          <span>💬 ${p.respuestas || 0} respuestas</span>
          <span>👍 ${p.likes || 0}</span>
        </div>
      </div>`;
  }).join('');
}

(async () => {
  session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('foro');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);
  await loadPosts();
})();

document.getElementById('btnNew').addEventListener('click', () => {
  document.getElementById('modal').classList.add('open');
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') e.target.classList.remove('open');
});
document.getElementById('btnPublish').addEventListener('click', async () => {
  const titulo = document.getElementById('pTitle').value.trim();
  const body   = document.getElementById('pBody').value.trim();
  const tag    = document.getElementById('pTag').value;
  if (!titulo || !body) { toast('Completa título y contenido', true); return; }
  try {
    await addDoc(collection(db, 'foro'), {
      titulo, body, tag,
      uid: session.uid,
      autor: session.name,
      createdAt: serverTimestamp(),
      views: 0, respuestas: 0, likes: 0
    });
    toast('✅ Publicación creada');
    document.getElementById('modal').classList.remove('open');
    document.getElementById('pTitle').value = '';
    document.getElementById('pBody').value = '';
    await loadPosts();
  } catch (err) {
    toast('Error al publicar', true);
  }
});
</script>
</body>
</html>
