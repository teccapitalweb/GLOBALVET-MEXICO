<style>
  .forum-toolbar {

  }

    border-radius: 50px;

    font-weight: 600;

  }

  }

  .post-item {

<script type="module">

let _session;
let _allPosts = [];
let _filter = 'todas';
const _likedKey = 'gv_liked_posts';

// Posts con like por usuario (localStorage)
function isLiked(id) {
  try {
    const arr = JSON.parse(localStorage.getItem(_likedKey) || '[]');
    return arr.includes(id);
  } catch(e) { return false; }
}
function setLiked(id, liked) {
  try {
    let arr = JSON.parse(localStorage.getItem(_likedKey) || '[]');
    if (liked && !arr.includes(id)) arr.push(id);
    if (!liked) arr = arr.filter(x => x !== id);
    localStorage.setItem(_likedKey, JSON.stringify(arr));
  } catch(e) {}
}

function initials(n) {
  return (n || 'U').split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase();
}

function formatFecha(d) {
  if (!d) return '';
  const date = d.toDate ? d.toDate() : new Date(d);
  const diff = Date.now() - date.getTime();
  const h = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (h < 1) return 'hace un momento';
  if (h < 24) return `hace ${h}h`;
  if (days === 1) return 'ayer';
  if (days < 7) return `hace ${days} días`;
  if (days < 30) return `hace ${Math.floor(days/7)} sem`;
  return date.toLocaleDateString('es-MX', { day:'numeric', month:'short' });
}

async function loadPosts() {
  const content = document.getElementById('content');
  content.classList.add('loading');
  content.textContent = 'Cargando foro…';

  let fbPosts = [];
  try {
    const snap = await getDocs(query(collection(db, 'foro'), orderBy('createdAt', 'desc')));
    fbPosts = await Promise.all(snap.docs.map(async d => {
      const data = d.data();
      // traer respuestas
      let respuestas = [];
      try {
        const rsnap = await getDocs(query(collection(db, 'foro', d.id, 'respuestas'), orderBy('createdAt', 'asc')));
        respuestas = rsnap.docs.map(r => ({ id: r.id, ...r.data() }));
      } catch(e) {}
      return { id: d.id, ...data, respuestas };
    }));
  } catch(e) { console.log('Firestore foro:', e.message); }

  // Combinar: primero los de Firestore, luego los seeds (si no hay suficientes)
  _allPosts = fbPosts.length >= 2 ? fbPosts : [...fbPosts, ...SEEDS];

  // Stats
  const totalReplies = _allPosts.reduce((s, p) => s + (p.respuestas?.length || 0), 0);
  document.getElementById('nPosts').textContent = _allPosts.length;
  document.getElementById('nReplies').textContent = totalReplies;

  content.classList.remove('loading');
  renderPosts();
}

function renderPosts() {
  const content = document.getElementById('content');
  let list = _filter === 'todas' ? _allPosts : _allPosts.filter(p => p.tag === _filter);
  if (list.length === 0) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><h3>No hay publicaciones en esta categoría</h3><p>Sé el primero en publicar.</p></div>`;
    return;
  }

  content.innerHTML = list.map(p => {
    const fecha = formatFecha(p.createdAt);
    const liked = isLiked(p.id);
    const likes = (p.likes || 0) + (liked ? 1 : 0); // si el usuario dio like ahora, mostrarlo localmente
    const numResp = p.respuestas?.length || 0;
    return `
      <div class="post-item" id="post-${p.id}">
        <div class="post-head">
          <div class="post-avatar">${initials(p.autor)}</div>
          <div>
            <div class="post-author">${p.autor || 'Miembro VIP'} ${p.especialista ? '<span class="post-author-badge">Especialista</span>' : ''}</div>
            <div class="post-date">${fecha}</div>
          </div>
          ${p.tag ? `<span class="post-tag">${p.tag}</span>` : ''}
        </div>
        <h3 class="post-title" onclick="window._togglePost('${p.id}')">${p.titulo}</h3>
        <p class="post-body">${(p.body || '').replace(/\n/g,'<br>')}</p>
        <div class="post-meta">
          <button class="post-meta-item" onclick="window._togglePost('${p.id}')">💬 <span id="c-${p.id}">${numResp}</span> respuesta${numResp !== 1 ? 's' : ''}</button>
          <button class="post-meta-item ${liked ? 'liked' : ''}" onclick="window._toggleLike('${p.id}', this)">${liked ? '❤️' : '🤍'} <span id="l-${p.id}">${likes}</span></button>
          <span class="post-meta-item" style="cursor:default;">👁️ ${(p.views || 0) + 1}</span>
        </div>
        <div class="replies-wrap" id="replies-${p.id}">
          ${(p.respuestas || []).map(r => `
            <div class="reply">
              <div class="reply-avatar">${initials(r.autor)}</div>
              <div class="reply-body">
                <div class="reply-head">
                  <span class="reply-author">${r.autor || 'Miembro'} ${r.especialista ? '<span class="post-author-badge">Esp</span>' : ''}</span>
                  <span class="reply-date">${formatFecha(r.createdAt)}</span>
                </div>
                <div class="reply-text">${(r.texto || '').replace(/\n/g,'<br>')}</div>
              </div>
            </div>
          `).join('')}
          <div class="reply-form">
            <textarea id="txt-${p.id}" placeholder="Escribe tu respuesta…"></textarea>
            <button class="btn btn-primary" onclick="window._sendReply('${p.id}')">Responder</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

window._togglePost = (id) => {
  const el = document.getElementById('replies-' + id);
  if (el) el.classList.toggle('open');
};

window._toggleLike = async (id, btn) => {
  const liked = isLiked(id);
  setLiked(id, !liked);
  btn.classList.toggle('liked', !liked);
  // Cambiar el icono
  const spanL = document.getElementById('l-' + id);
  const current = parseInt(spanL.textContent) || 0;
  spanL.textContent = liked ? Math.max(0, current - 1) : current + 1;
  btn.innerHTML = btn.innerHTML.replace(/🤍|❤️/, liked ? '🤍' : '❤️');

  // Intentar guardar en Firestore (si es un post real, no seed)
  if (!id.startsWith('seed-')) {
    try {
      const pref = doc(db, 'foro', id);
      const snap = await getDoc(pref);
      if (snap.exists()) {
        const n = snap.data().likes || 0;
        await updateDoc(pref, { likes: liked ? Math.max(0, n - 1) : n + 1 });
      }
    } catch(e) {}
  }
};

window._sendReply = async (postId) => {
  const txtEl = document.getElementById('txt-' + postId);
  const texto = txtEl.value.trim();
  if (!texto) { toast('Escribe algo antes de responder', true); return; }

  // Si es un post seed, solo agregar localmente (no se persiste)
  if (postId.startsWith('seed-')) {
    const post = _allPosts.find(p => p.id === postId);
    if (post) {
      post.respuestas = post.respuestas || [];
      post.respuestas.push({
        autor: _session.name,
        texto,
        createdAt: new Date(),
        especialista: false
      });
      toast('✅ Respuesta agregada (demo local)');
      renderPosts();
      // Re-abrir el post
      setTimeout(() => document.getElementById('replies-' + postId)?.classList.add('open'), 50);
    }
    return;
  }

  try {
    await addDoc(collection(db, 'foro', postId, 'respuestas'), {
      autor: _session.name,
      uid: _session.uid,
      texto,
      createdAt: serverTimestamp()
    });
    // Actualizar contador en el post
    try {
      const pref = doc(db, 'foro', postId);
      const snap = await getDoc(pref);
      if (snap.exists()) {
        await updateDoc(pref, { respuestas: (snap.data().respuestas || 0) + 1 });
      }
    } catch(e) {}
    toast('✅ Respuesta publicada');
    txtEl.value = '';
    await loadPosts();
    setTimeout(() => document.getElementById('replies-' + postId)?.classList.add('open'), 100);
  } catch(err) {
    toast('Error: ' + err.message, true);
  }
};

(async () => {
  _session = await requireAuth();
  if (!_session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(_session);
  document.getElementById('sidebar').innerHTML = renderSidebar('foro');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);
  await loadPosts();
})();

document.querySelectorAll('.forum-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.forum-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _filter = btn.dataset.tag;
    renderPosts();
  });
});

document.getElementById('btnNew').addEventListener('click', () => {
  document.getElementById('modal').classList.add('open');
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') e.target.classList.remove('open');
});
document.getElementById('btnPublish').addEventListener('click', async () => {
  const titulo = document.getElementById('pTitle').value.trim();
  const body = document.getElementById('pBody').value.trim();
  const tag = document.getElementById('pTag').value;
  if (!titulo || !body) return toast('Completa título y contenido', true);
  try {
    await addDoc(collection(db, 'foro'), {
      titulo, body, tag,
      uid: _session.uid,
      autor: _session.name,
      createdAt: serverTimestamp(),
      views: 0, respuestas: 0, likes: 0,
      especialista: false
    });
    toast('✅ Publicación creada');
    document.getElementById('modal').classList.remove('open');
    document.getElementById('pTitle').value = '';
    document.getElementById('pBody').value = '';
    await loadPosts();
  } catch (err) { toast('Error al publicar: ' + err.message, true); }
});
</script>
</body>
</html>
