<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .vid-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:transform .15s,box-shadow .15s}
  .vid-card:hover:not(.lock-card){transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .vid-thumb{aspect-ratio:16/9;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:rgba(255,255,255,.5);position:relative}
  .vid-body{padding:1rem 1.1rem}
  .vid-body h3{font-family:var(--ff);font-size:1rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
  .vid-meta{font-size:.78rem;color:var(--muted)}
  .vid-play-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
  .vid-play-overlay.open{display:flex}
  .vid-play-box{width:100%;max-width:960px;background:#000;border-radius:12px;overflow:hidden}
  .vid-play-header{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.2rem;background:var(--dark);color:#fff}
  .vid-play-header h3{font-family:var(--ff);font-size:1rem;margin:0}
  .vid-play-close{background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer}
  .vid-iframe{position:relative;padding-bottom:56.25%;height:0}
  .vid-iframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .info-banner{background:linear-gradient(135deg,var(--plight) 0%,#fef3c7 100%);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.5rem;font-size:.88rem;color:var(--dark)}
  .info-banner strong{color:var(--purple)}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>🎥 Videos prácticos</h1>
      <p>Técnicas clínicas explicadas paso a paso por veterinarios especialistas</p>
    </div>
    <div id="dripBanner"></div>
    <div id="content" class="loading">Cargando videos…</div>
  </main>
</div>

<div class="vid-play-overlay" id="player">
  <div class="vid-play-box">
    <div class="vid-play-header">
      <h3 id="playerTitle">—</h3>
      <button class="vid-play-close" onclick="document.getElementById('player').classList.remove('open');document.getElementById('playerFrame').innerHTML='';">×</button>
    </div>
    <div class="vid-iframe" id="playerFrame"></div>
  </div>
</div>

<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, getUnlockStatus, formatUnlockDate, getDiasDesdeRegistro, DRIP_DIAS_POR_CURSO, db, collection, query, orderBy, getDocs } from '../assets/js/club-extra.js';

(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('videos');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  // Cargar videos desde Firestore (colección 'videos', ordenada por fecha de creación)
  let videos = [];
  try {
    const snap = await getDocs(query(collection(db, 'videos'), orderBy('createdAt', 'asc')));
    videos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (err) {
    console.log('Colección videos vacía o sin permisos:', err.message);
  }

  const content = document.getElementById('content');
  content.classList.remove('loading');

  if (videos.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎬</div>
        <h3 style="font-family:var(--ff);color:var(--dark);margin-bottom:.5rem;">Próximamente</h3>
        <p>Estamos preparando videos prácticos de técnicas clínicas con veterinarios especialistas. Mantente atento.</p>
      </div>`;
    return;
  }

  // Banner de drip content
  const dias = getDiasDesdeRegistro(session);
  const lockedCount = videos.filter((_, i) => !getUnlockStatus(i, session).unlocked).length;
  if (lockedCount > 0) {
    document.getElementById('dripBanner').innerHTML = `
      <div class="info-banner">
        🔓 <strong>1 video nuevo cada ${DRIP_DIAS_POR_CURSO} días</strong> desde tu compra.
        Llevas ${dias} día${dias !== 1 ? 's' : ''} como miembro ·
        ${videos.length - lockedCount} de ${videos.length} disponibles
      </div>`;
  }

  content.innerHTML = `<div class="card-grid">
    ${videos.map((v, i) => {
      const { unlocked, unlockDate, daysLeft } = getUnlockStatus(i, session);
      const dateLabel = unlockDate ? formatUnlockDate(unlockDate) : '';
      return `
        <div class="vid-card ${!unlocked ? 'lock-card' : ''}" ${unlocked ? `onclick="window._play('${v.driveId || ''}', ${JSON.stringify(v.title || '')})"` : ''} style="${unlocked ? 'cursor:pointer' : ''}">
          <div class="vid-thumb">${unlocked ? '🎥' : '🔒'}</div>
          <div class="vid-body">
            <h3>${v.title || 'Video'}</h3>
            <div class="vid-meta">${v.area || 'Medicina veterinaria'} · ${v.duration || '—'}</div>
            ${!unlocked ? `<div class="lock-info">🔒 Disponible el ${dateLabel} (${daysLeft} día${daysLeft !== 1 ? 's' : ''})</div>` : ''}
          </div>
        </div>`;
    }).join('')}
  </div>`;
})();

window._play = (driveId, title) => {
  if (!driveId) return;
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerFrame').innerHTML = `<iframe src="https://drive.google.com/file/d/${driveId}/preview" allow="autoplay" allowfullscreen></iframe>`;
  document.getElementById('player').classList.add('open');
};
document.getElementById('player').addEventListener('click', e => {
  if (e.target.id === 'player') {
    e.target.classList.remove('open');
    document.getElementById('playerFrame').innerHTML = '';
  }
});
</script>
</body>
</html>
