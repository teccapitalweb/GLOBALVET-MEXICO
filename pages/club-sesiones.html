<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinars en vivo · Club VIP GlobalVet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/club.css">
  <link rel="stylesheet" href="../assets/css/club-mobile.css">
  <link rel="stylesheet" href="../assets/css/club-theme.css">
  <style>
    .webinar-hero {
      position: relative;
      background: linear-gradient(135deg, #1F5F3A 0%, #0F3B22 50%, #D55A28 100%);
      border-radius: 20px;
      padding: 36px 32px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .webinar-hero::before {
      content: '';
      position: absolute;
      top: -50%; right: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,163,23,0.25) 0%, transparent 60%);
      animation: heroFloat 8s ease-in-out infinite;
    }
    .webinar-hero::after {
      content: '';
      position: absolute;
      bottom: -40%; left: -10%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(111,191,115,0.2) 0%, transparent 60%);
      animation: heroFloat 10s ease-in-out infinite reverse;
    }
    @keyframes heroFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
    }
    .webinar-hero__content { position: relative; z-index: 2; }
    .webinar-hero__live-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px; border-radius: 20px;
      font-size: .76rem; font-weight: 700; color: #fff;
      letter-spacing: .08em; text-transform: uppercase;
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
    }
    .webinar-hero__live-dot {
      width: 8px; height: 8px; background: #ff4a4a; border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 12px #ff4a4a;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }
    .webinar-hero__title {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem; font-weight: 800; color: #fff;
      line-height: 1.15; margin: 0 0 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .webinar-hero__speaker {
      color: rgba(255,255,255,0.9); font-size: 1rem;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .webinar-hero__speaker::before { content: '👤'; font-size: 1.1rem; }
    .webinar-hero__info {
      display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .webinar-hero__info-chip {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 14px; border-radius: 10px;
      color: #fff; font-size: .86rem; font-weight: 600;
      backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 6px;
    }

    .webinar-countdown {
      display: flex; gap: 10px; margin: 20px 0 26px; flex-wrap: wrap;
    }
    .webinar-countdown__unit {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 12px 16px;
      text-align: center; min-width: 70px;
      backdrop-filter: blur(10px);
    }
    .webinar-countdown__num {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem; font-weight: 800; color: #E8A317;
      line-height: 1; display: block;
    }
    .webinar-countdown__lbl {
      color: rgba(255,255,255,0.7);
      font-size: .72rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      margin-top: 4px; display: block;
    }

    .btn-meet {
      display: inline-flex; align-items: center; gap: 10px;
      background: #ffffff; color: #1a73e8;
      border: 0; padding: 14px 26px; border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: all .2s;
    }
    .btn-meet:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .btn-meet__icon {
      width: 28px; height: 28px; background: #1a73e8;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: .7rem; letter-spacing: -1px;
    }

    .section-title-webinars {
      display: flex; align-items: center; gap: 10px;
      color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      margin: 30px 0 16px;
    }

    .webinar-card {
      background: var(--zoo-bg-card);
      border: 1px solid var(--zoo-border);
      border-radius: 14px; padding: 20px;
      margin-bottom: 14px;
      display: flex; gap: 18px; align-items: center;
      transition: all .25s;
      position: relative; overflow: hidden;
      animation: cardIn .5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    .webinar-card:nth-child(2) { animation-delay: .05s; }
    .webinar-card:nth-child(3) { animation-delay: .1s; }
    .webinar-card:nth-child(4) { animation-delay: .15s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .webinar-card:hover {
      border-color: rgba(232,163,23,0.4);
      transform: translateX(4px);
      box-shadow: -4px 0 0 0 var(--zoo-amber);
    }
    .webinar-card__date {
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(232,163,23,0.15), rgba(31,95,58,0.2));
      border: 1px solid rgba(232,163,23,0.3);
      border-radius: 12px; padding: 14px;
      text-align: center; min-width: 80px;
    }
    .webinar-card__date-day {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      color: var(--zoo-amber); line-height: 1;
    }
    .webinar-card__date-month {
      color: var(--zoo-text-muted);
      font-size: .72rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      margin-top: 4px;
    }
    .webinar-card__body { flex: 1; min-width: 0; }
    .webinar-card__title {
      color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 1.02rem; font-weight: 700;
      margin: 0 0 4px; line-height: 1.3;
    }
    .webinar-card__speaker {
      color: var(--zoo-green-500);
      font-size: .86rem; font-weight: 600;
      margin-bottom: 4px;
    }
    .webinar-card__meta {
      color: var(--zoo-text-muted); font-size: .82rem;
      display: flex; gap: 14px; flex-wrap: wrap;
    }
    .webinar-card__meta-item { display: flex; align-items: center; gap: 4px; }
    .webinar-card__tag {
      background: rgba(213,90,40,0.15);
      border: 1px solid rgba(213,90,40,0.3);
      color: #f08a5f;
      padding: 4px 10px; border-radius: 12px;
      font-size: .72rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      white-space: nowrap;
    }
    .webinar-card__tag.is-soon {
      background: rgba(232,163,23,0.15);
      border-color: rgba(232,163,23,0.4);
      color: var(--zoo-amber);
      animation: tagPulse 2s ease-in-out infinite;
    }
    @keyframes tagPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,163,23,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(232,163,23,0); }
    }

    .webinars-empty {
      background: var(--zoo-bg-card);
      border: 2px dashed var(--zoo-border);
      border-radius: 16px; padding: 50px 30px;
      text-align: center;
    }
    .webinars-empty__icon {
      font-size: 4rem; margin-bottom: 12px;
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .webinars-empty__title {
      color: #fff; font-family: 'Poppins', sans-serif;
      font-size: 1.2rem; font-weight: 700; margin-bottom: 8px;
    }
    .webinars-empty__text {
      color: var(--zoo-text-muted);
      font-size: .92rem; line-height: 1.5;
      max-width: 400px; margin: 0 auto;
    }

    @media (max-width: 600px) {
      .webinar-hero { padding: 26px 22px; }
      .webinar-hero__title { font-size: 1.5rem; }
      .webinar-card { flex-direction: column; align-items: flex-start; }
      .webinar-countdown__unit { min-width: 60px; padding: 10px; }
      .webinar-countdown__num { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="club-layout">
    <aside class="club-sidebar" id="sidebar"></aside>
    <main class="club-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menú">☰</button>
        <div style="display:flex;gap:10px;align-items:center;margin-left:auto;">
          <button class="notif-icon" id="notifBtn" title="Notificaciones" aria-label="Notificaciones">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></button>
          <button class="theme-toggle" id="themeToggleBtn" title="Cambiar tema" aria-label="Cambiar tema" onclick="GLOBALVET_CLUB.toggleTheme()">☀️</button>
        </div>
      </div>
      <!-- Panel de notificaciones -->
      <div class="notif-panel" id="notifPanel" style="display:none;">
        <div class="notif-panel__header">
          <h3>🔔 Notificaciones</h3>
          <button class="notif-panel__close" id="notifPanelClose" aria-label="Cerrar">✕</button>
        </div>
        <div class="notif-panel__actions" id="notifPanelActions" style="display:none;">
          <button class="notif-mark-all" id="notifMarkAll">Marcar todas como leídas</button>
        </div>
        <div class="notif-panel__list" id="notifList">Cargando...</div>
      </div>
      <div class="page-header">
        <h1>🎥 Webinars en vivo</h1>
        <p>Masterclasses exclusivas con especialistas invitados · Transmitidas por Google Meet</p>
      </div>
      <div id="lockedNotice"></div>
      <div id="nextSession">Cargando...</div>
      <div id="sessionsWrap"></div>
    </main>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/club.js"></script>
  <script>
    (async () => {
      const session = await GLOBALVET_CLUB.requireAuth();
      if (!session) return;
      document.getElementById('sidebar').innerHTML = GLOBALVET_CLUB.renderSidebar('sesiones', session);
      if (GLOBALVET_CLUB.initTheme) GLOBALVET_CLUB.initTheme();
      if (GLOBALVET_CLUB.initMobileMenu) GLOBALVET_CLUB.initMobileMenu();
      if (GLOBALVET_CLUB.initNotifications) GLOBALVET_CLUB.initNotifications(session);


      if (session.planStatus !== 'active') {
        document.getElementById('lockedNotice').innerHTML = `<div class="status-banner" style="margin-bottom:20px;"><span>🔒</span>Activa tu membresía para recibir el link de Google Meet. <a href="club-suscripcion.html" style="color:inherit;text-decoration:underline;margin-left:6px;">Activar →</a></div>`;
      }

      const sesiones = await GLOBALVET_CLUB.getSesiones();
      const isActive = session.planStatus === 'active';
      const nextBox = document.getElementById('nextSession');
      const listWrap = document.getElementById('sessionsWrap');

      if (!sesiones || sesiones.length === 0) {
        nextBox.innerHTML = `
          <div class="webinars-empty">
            <div class="webinars-empty__icon">🎥</div>
            <div class="webinars-empty__title">Próximamente nuevos webinars</div>
            <div class="webinars-empty__text">
              El equipo GlobalVet México está preparando webinars con especialistas invitados.
              Te avisaremos en cuanto publiquemos los próximos eventos.
            </div>
          </div>`;
        return;
      }

      const next = sesiones[0];
      const meetUrl = next.meetUrl || next.zoomUrl || '';
      const linkBtn = isActive && meetUrl
        ? `<a href="${meetUrl}" target="_blank" class="btn-meet"><span class="btn-meet__icon">M</span>Entrar al webinar</a>`
        : !isActive
        ? `<a href="club-suscripcion.html" class="btn-meet" style="background:var(--zoo-orange);color:#fff;">🔒 Activar para ver link</a>`
        : `<span style="color:rgba(255,255,255,0.7);font-size:.9rem;">⏳ Link de Meet disponible 15 min antes</span>`;

      const mesesShort = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

      nextBox.innerHTML = `
        <div class="webinar-hero">
          <div class="webinar-hero__content">
            <div class="webinar-hero__live-badge">
              <span class="webinar-hero__live-dot"></span>
              Próximo webinar
            </div>
            <h2 class="webinar-hero__title">${next.title}</h2>
            <div class="webinar-hero__speaker">${next.speaker || 'Especialista GlobalVet México'}</div>
            <div class="webinar-hero__info">
              <div class="webinar-hero__info-chip">📅 ${GLOBALVET_CLUB.formatShort(next.date)}</div>
              <div class="webinar-hero__info-chip">🕐 ${next.time || '19:00'} hrs</div>
              <div class="webinar-hero__info-chip">💻 Google Meet</div>
              ${next.duration ? `<div class="webinar-hero__info-chip">⏱️ ${next.duration}</div>` : ''}
            </div>
            <div class="webinar-countdown" id="liveCountdown"></div>
            ${linkBtn}
          </div>
        </div>
      `;

      function renderCountdown() {
        const diff = new Date(next.date).getTime() - Date.now();
        const el = document.getElementById('liveCountdown');
        if (!el) return;
        if (diff <= 0) {
          el.innerHTML = `
            <div class="webinar-countdown__unit" style="border-color:#ff4a4a;background:rgba(255,74,74,0.15);">
              <span class="webinar-countdown__num" style="color:#ff4a4a;">🔴</span>
              <span class="webinar-countdown__lbl">EN VIVO</span>
            </div>`;
          return;
        }
        const d = Math.floor(diff / (1000*60*60*24));
        const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        el.innerHTML = `
          <div class="webinar-countdown__unit"><span class="webinar-countdown__num">${d}</span><span class="webinar-countdown__lbl">Días</span></div>
          <div class="webinar-countdown__unit"><span class="webinar-countdown__num">${String(h).padStart(2,'0')}</span><span class="webinar-countdown__lbl">Horas</span></div>
          <div class="webinar-countdown__unit"><span class="webinar-countdown__num">${String(m).padStart(2,'0')}</span><span class="webinar-countdown__lbl">Min</span></div>
          <div class="webinar-countdown__unit"><span class="webinar-countdown__num">${String(s).padStart(2,'0')}</span><span class="webinar-countdown__lbl">Seg</span></div>
        `;
      }
      renderCountdown();
      setInterval(renderCountdown, 1000);

      if (sesiones.length > 1) {
        const resto = sesiones.slice(1);
        listWrap.innerHTML = `
          <div class="section-title-webinars">📅 Próximos webinars</div>
          ${resto.map(s => {
            const d = new Date(s.date);
            const diffDays = Math.ceil((d - new Date()) / (1000*60*60*24));
            const tagClass = diffDays <= 7 && diffDays > 0 ? 'webinar-card__tag is-soon' : 'webinar-card__tag';
            const tagText = diffDays <= 0 ? 'EN VIVO' : diffDays <= 7 ? `En ${diffDays} día${diffDays !== 1 ? 's' : ''}` : 'Próximo';
            return `
              <div class="webinar-card">
                <div class="webinar-card__date">
                  <div class="webinar-card__date-day">${d.getDate()}</div>
                  <div class="webinar-card__date-month">${mesesShort[d.getMonth()]}</div>
                </div>
                <div class="webinar-card__body">
                  <div class="webinar-card__title">${s.title}</div>
                  <div class="webinar-card__speaker">👤 ${s.speaker || 'Especialista GlobalVet México'}</div>
                  <div class="webinar-card__meta">
                    <span class="webinar-card__meta-item">🕐 ${s.time || '19:00'} hrs</span>
                    <span class="webinar-card__meta-item">💻 Google Meet</span>
                    ${s.duration ? `<span class="webinar-card__meta-item">⏱️ ${s.duration}</span>` : ''}
                  </div>
                </div>
                <span class="${tagClass}">${tagText}</span>
              </div>
            `;
          }).join('')}
        `;
      }
    })();
  </script>
</body>
</html>
