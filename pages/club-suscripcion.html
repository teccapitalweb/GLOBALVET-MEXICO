<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi suscripción · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<script src="https://js.stripe.com/v3/"></script>
<script src="../assets/js/stripe-config.js"></script>
<style>
  .sub-card {
    background: var(--gv-bg-surface);
    border: 1px solid var(--gv-border);
    border-radius: var(--gv-radius-lg);
    padding: 1.6rem 1.8rem;
    margin-bottom: 1.2rem;
  }
  .sub-card h2 {
    font-family: var(--gv-ff);
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    color: var(--gv-text);
  }
  .sub-card.warning {
    background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
    border-color: var(--gv-border-gold);
  }
  .sub-card.success {
    background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.05));
    border-color: rgba(16,185,129,0.3);
  }
  .sub-card.danger {
    background: linear-gradient(135deg, rgba(244,63,94,0.1), rgba(244,63,94,0.05));
    border-color: rgba(244,63,94,0.3);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--gv-border);
    gap: 1rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    color: var(--gv-text-muted);
    font-size: 0.88rem;
    font-weight: 500;
  }
  .info-value {
    color: var(--gv-text);
    font-family: var(--gv-ff);
    font-weight: 700;
    text-align: right;
  }

  .plans-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.2rem;
    margin-top: 1.2rem;
  }

  .plan-card {
    background: var(--gv-bg-surface);
    border: 1.5px solid var(--gv-border);
    border-radius: var(--gv-radius-lg);
    padding: 1.8rem 1.6rem;
    position: relative;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .plan-card.featured {
    border-color: var(--gv-gold);
    background:
      radial-gradient(ellipse 300px 200px at 50% 0%, rgba(245,158,11,0.12), transparent 60%),
      var(--gv-bg-surface-2);
    box-shadow: 0 8px 30px rgba(245,158,11,0.15);
  }
  .plan-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(139,92,246,0.2);
  }
  .plan-card.featured:hover {
    box-shadow: 0 16px 40px rgba(245,158,11,0.25);
  }

  .plan-badge {
    position: absolute;
    top: -12px;
    right: 16px;
    background: linear-gradient(135deg, var(--gv-gold), var(--gv-gold-deep));
    color: #1a0f04;
    padding: 0.35rem 0.9rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(245,158,11,0.4);
  }

  .plan-tag {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--gv-purple-hover);
    margin-bottom: 0.3rem;
  }
  .plan-card.featured .plan-tag {
    color: var(--gv-gold-hover);
  }

  .plan-price {
    font-family: var(--gv-ff);
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--gv-text);
    line-height: 1;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }
  .plan-price-unit {
    font-size: 0.95rem;
    color: var(--gv-text-muted);
    font-weight: 400;
  }
  .plan-note {
    color: var(--gv-text-muted);
    font-size: 0.88rem;
    margin-bottom: 1.3rem;
  }
  .plan-note strong {
    color: var(--gv-emerald-hover);
  }
  .plan-card.featured .plan-note strong {
    color: var(--gv-gold-hover);
  }

  .plan-features {
    list-style: none;
    margin-bottom: 1.5rem;
  }
  .plan-features li {
    padding: 0.4rem 0;
    color: var(--gv-text-muted);
    font-size: 0.9rem;
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
  }
  .plan-features li::before {
    content: '✓';
    color: var(--gv-emerald);
    font-weight: 800;
    flex-shrink: 0;
  }
  .plan-card.featured .plan-features li::before {
    color: var(--gv-gold);
  }

  .loading-box {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--gv-text-muted);
  }

  .config-warning {
    background: rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.3);
    color: #fda4af;
    padding: 1rem 1.3rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    font-size: 0.88rem;
    line-height: 1.6;
  }
  .config-warning code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--gv-gold-hover);
    font-size: 0.82rem;
  }

  /* Overlay de "procesando pago" (tras volver de Stripe) */
  .pay-wait-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,6,20,0.95);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .pay-wait-modal {
    max-width: 480px;
    width: 100%;
    background: linear-gradient(135deg, var(--gv-bg-surface-2), var(--gv-bg-surface));
    border: 2px solid var(--gv-border-gold);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .pay-wait-icon {
    font-size: 4rem;
    margin-bottom: 0.8rem;
    animation: pulsePay 1.5s ease-in-out infinite;
  }
  @keyframes pulsePay { 0%,100% {transform:scale(1)} 50% {transform:scale(1.1)} }
  .pay-wait-dots {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
    margin: 1.2rem 0;
  }
  .pay-wait-dot {
    width: 10px; height: 10px;
    background: var(--gv-gold);
    border-radius: 50%;
    animation: bouncePay 1.4s ease-in-out infinite;
  }
  .pay-wait-dot:nth-child(2) { animation-delay: 0.2s; }
  .pay-wait-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bouncePay { 0%,80%,100% {transform:translateY(0);opacity:0.5} 40% {transform:translateY(-8px);opacity:1} }
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">

    <div class="ph">
      <h1>💳 Mi suscripción</h1>
      <p>Gestiona tu membresía VIP del Club GlobalVet México</p>
    </div>

    <div id="content" class="loading-box">Cargando información de tu cuenta…</div>
  </main>
</div>

<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, toast, db, collection, doc, getDoc, updateDoc, serverTimestamp, auth } from '../assets/js/club-extra.js';

let _session;

function fmtMoney(n) {
  return '$' + n.toLocaleString('es-MX');
}

function fmtFecha(d) {
  if (!d) return '—';
  const date = d.toDate ? d.toDate() : new Date(d);
  if (isNaN(date)) return '—';
  return date.toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
}

function renderSinPago() {
  const S = window.STRIPE_CONFIG;
  const content = document.getElementById('content');
  const configOk = S.isConfigured();

  content.innerHTML = `
    ${!configOk ? `
      <div class="config-warning">
        <strong>⚙️ Stripe aún no está configurado.</strong><br>
        Para activar los pagos, edita <code>assets/js/stripe-config.js</code> y llena los Price IDs, Public Key y API URL del servidor. Los botones de abajo están visibles solo como preview.
      </div>
    ` : ''}

    <div class="sub-card warning">
      <h2 style="color:var(--gv-gold-hover);">⏳ Activa tu membresía VIP</h2>
      <p style="color:var(--gv-text-muted);margin-bottom:1rem;">
        Tu cuenta está creada. Elige tu plan y activa todos los beneficios VIP ahora mismo:
        biblioteca completa de cursos, herramientas clínicas, sesiones en vivo, constancias oficiales y 20% OFF en cursos premium.
      </p>

      <div style="background:rgba(0,0,0,0.25);border:1px solid var(--gv-border-gold);border-radius:10px;padding:1rem 1.2rem;margin-top:1rem;">
        <div style="color:var(--gv-text);font-weight:700;font-size:0.95rem;margin-bottom:0.4rem;">💰 ¿Ya realizaste el pago?</div>
        <p style="color:var(--gv-text-muted);font-size:0.84rem;margin-bottom:0.8rem;line-height:1.5;">
          Si ya pagaste pero tu membresía no se activó, presiona el botón para verificar tu pago manualmente.
        </p>
        <button class="btn btn-outline" id="verifyPaymentBtn" style="padding:0.6rem 1.2rem;font-size:0.88rem;">🔍 Verificar mi pago</button>
        <div id="verifyMsg" style="margin-top:0.6rem;"></div>
      </div>
    </div>

    <div class="plans-grid">
      <!-- PLAN MENSUAL -->
      <div class="plan-card">
        <div class="plan-tag">Plan Mensual</div>
        <div class="plan-price">${fmtMoney(S.PRECIO_MENSUAL_MXN)}<span class="plan-price-unit"> MXN /mes</span></div>
        <p class="plan-note">Facturación mensual · Cancela cuando quieras</p>
        <ul class="plan-features">
          <li>Acceso completo 30 días</li>
          <li>Renovación automática</li>
          <li>20% OFF en cursos premium</li>
          <li>Herramientas clínicas Pro</li>
          <li>Constancias oficiales verificables</li>
        </ul>
        <button class="btn btn-outline btn-block" onclick="window._pagar('mensual')" ${!configOk ? 'disabled' : ''}>
          Suscribirme mensual
        </button>
      </div>

      <!-- PLAN ANUAL -->
      <div class="plan-card featured">
        <span class="plan-badge">Ahorra ${fmtMoney(S.AHORRO_ANUAL_MXN)}</span>
        <div class="plan-tag">Plan Anual · Recomendado</div>
        <div class="plan-price">${fmtMoney(S.PRECIO_ANUAL_MXN)}<span class="plan-price-unit"> MXN /año</span></div>
        <p class="plan-note">Equivale a <strong>$${Math.round(S.PRECIO_ANUAL_MXN/12).toLocaleString('es-MX')}/mes</strong> · Ahorras ${fmtMoney(S.AHORRO_ANUAL_MXN)}</p>
        <ul class="plan-features">
          <li>Acceso completo 365 días</li>
          <li>Sin sorpresas de cobros mensuales</li>
          <li>20% OFF en cursos todo el año</li>
          <li>Herramientas clínicas Pro</li>
          <li>Constancias oficiales verificables</li>
          <li><strong style="color:var(--gv-gold-hover);">2 meses gratis</strong></li>
        </ul>
        <button class="btn btn-gold btn-block" onclick="window._pagar('anual')" ${!configOk ? 'disabled' : ''}>
          Suscribirme anual
        </button>
      </div>
    </div>

    <p style="text-align:center;color:var(--gv-text-dim);font-size:0.82rem;margin-top:1.5rem;">
      🔒 Pago seguro procesado por Stripe · Tu membresía se activa automáticamente al completar el pago
    </p>
  `;

  document.getElementById('verifyPaymentBtn')?.addEventListener('click', verifyPayment);
}

function renderActiva(miembro) {
  const S = window.STRIPE_CONFIG;
  const content = document.getElementById('content');
  const fechaVence = miembro.planVence ? (miembro.planVence.toDate ? miembro.planVence.toDate() : new Date(miembro.planVence)) : null;
  const tieneTiempo = fechaVence && fechaVence.getTime() > Date.now();
  const diasRestantes = tieneTiempo ? Math.ceil((fechaVence - new Date()) / 86400000) : 0;
  const activa = miembro.planStatus === 'active';
  const cancelada = miembro.planStatus === 'cancelled';
  const tipoPlan = miembro.planTipo === 'anual' ? 'Anual' : 'Mensual';
  const precio = miembro.planTipo === 'anual' ? S.PRECIO_ANUAL_MXN : S.PRECIO_MENSUAL_MXN;
  const unidad = miembro.planTipo === 'anual' ? '/año' : '/mes';

  let html = `
    <div class="sub-card ${activa ? 'success' : ''}">
      <h2>Plan actual</h2>
      <div class="info-row">
        <span class="info-label">Plan</span>
        <span class="info-value">Miembro VIP GlobalVet — ${tipoPlan}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Precio</span>
        <span class="info-value">${fmtMoney(precio)} MXN ${unidad}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Estado</span>
        <span class="info-value" style="color:${activa ? 'var(--gv-emerald-hover)' : 'var(--gv-rose)'};">
          ${activa ? '● Activa' : '✕ Cancelada'}
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">${activa ? 'Próxima renovación' : 'Acceso hasta'}</span>
        <span class="info-value">${fmtFecha(miembro.planVence)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Último pago</span>
        <span class="info-value">${fmtFecha(miembro.ultimoPago)}</span>
      </div>
    </div>
  `;

  // Si está cancelada pero todavía con tiempo → ofrecer reanudar sin pagar
  if (cancelada && tieneTiempo) {
    html += `
      <div class="sub-card success">
        <h2 style="color:var(--gv-emerald-hover);">💚 ¿Te arrepentiste? Reanuda tu membresía</h2>
        <p style="color:var(--gv-text-muted);margin-bottom:1rem;line-height:1.55;">
          Tu membresía está cancelada pero aún tienes <strong style="color:var(--gv-emerald-hover);">${diasRestantes} día${diasRestantes !== 1 ? 's' : ''} de acceso</strong>.
          Puedes reactivarla ahora <strong>sin costo adicional</strong> y seguir disfrutando de todos los beneficios con renovación automática.
        </p>
        <button class="btn btn-emerald" id="reanudarBtn">✓ Reanudar mi membresía</button>
        <div id="reanudarMsg" style="margin-top:0.8rem;"></div>
      </div>
    `;
  }

  // Zona de peligro (cancelar) o reactivar (si ya expiró)
  if (activa) {
    html += `
      <div class="sub-card danger">
        <h2 style="color:#fda4af;">⚠️ Zona de peligro</h2>
        <p style="color:var(--gv-text-muted);margin-bottom:1rem;">
          Si cancelas tu membresía, mantienes el acceso hasta el final del período pagado.
          Después perderás acceso a la biblioteca, herramientas clínicas y descuentos VIP.
        </p>
        <button class="btn" id="cancelBtn" style="background:rgba(244,63,94,0.15);color:#fda4af;border:1px solid rgba(244,63,94,0.3);">
          Cancelar membresía
        </button>
        <div id="cancelMsg" style="margin-top:0.8rem;"></div>
      </div>
    `;
  } else if (!tieneTiempo) {
    html += `
      <div class="sub-card warning">
        <h2 style="color:var(--gv-gold-hover);">🔄 Reactivar con nuevo pago</h2>
        <p style="color:var(--gv-text-muted);margin-bottom:1rem;">
          Tu membresía venció. Reactívala para volver a tener acceso completo al contenido VIP.
        </p>
        <button class="btn btn-gold" onclick="window._pagar('mensual')">
          Reactivar por ${fmtMoney(S.PRECIO_MENSUAL_MXN)} MXN
        </button>
      </div>
    `;
  }

  // Historial de pagos (si hay)
  if (miembro.historialPagos && miembro.historialPagos.length) {
    html += `
      <div class="sub-card">
        <h2>Historial de pagos</h2>
        ${miembro.historialPagos.slice(-10).reverse().map(p => `
          <div class="info-row">
            <span class="info-label">${fmtFecha(p.fecha)}</span>
            <span class="info-value">${fmtMoney(p.monto)} · ${p.status === 'paid' ? '✓ Pagado' : p.status}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  content.innerHTML = html;

  document.getElementById('reanudarBtn')?.addEventListener('click', reanudar);
  document.getElementById('cancelBtn')?.addEventListener('click', cancelar);
}

// ═══ Pagar con Stripe ═══
window._pagar = async function(planType) {
  const S = window.STRIPE_CONFIG;
  if (!S.isConfigured()) {
    toast('⚙️ Stripe aún no está configurado. Edita assets/js/stripe-config.js', true);
    return;
  }
  const user = auth.currentUser;
  if (!user) { toast('Debes iniciar sesión', true); return; }

  const priceId = planType === 'anual' ? S.PRICE_ANUAL : S.PRICE_MENSUAL;
  const precio = planType === 'anual' ? S.PRECIO_ANUAL_MXN : S.PRECIO_MENSUAL_MXN;
  const planLabel = planType === 'anual' ? 'Plan Anual' : 'Plan Mensual';

  // Overlay de carga
  const overlay = document.createElement('div');
  overlay.className = 'pay-wait-overlay';
  overlay.innerHTML = `
    <div class="pay-wait-modal">
      <div class="pay-wait-icon">💳</div>
      <h2 style="font-family:var(--gv-ff);color:var(--gv-text);font-size:1.4rem;margin-bottom:0.4rem;">Llevándote al pago seguro</h2>
      <div style="color:var(--gv-gold-hover);font-weight:700;font-size:1rem;margin-bottom:0.8rem;">${planLabel} · ${fmtMoney(precio)} MXN</div>
      <p style="color:var(--gv-text-muted);font-size:0.9rem;margin-bottom:0.6rem;line-height:1.5;">
        Completa tu pago con <strong style="color:var(--gv-text);">Stripe (seguro)</strong> y te regresamos automáticamente al club.
      </p>
      <div style="color:var(--gv-text-dim);font-size:0.78rem;">Redirigiendo...</div>
    </div>
  `;
  document.body.appendChild(overlay);

  try {
    const response = await fetch(S.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        priceId,
        firebaseUID: user.uid,
        email: user.email,
        planType,
        successUrl: window.location.origin + '/pages/club-suscripcion.html?paid=1',
        cancelUrl: window.location.origin + '/pages/club-suscripcion.html?canceled=1'
      })
    });
    const data = await response.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'Error al crear sesión de pago');
    }
  } catch (err) {
    console.error('Error Stripe:', err);
    overlay.remove();
    toast('Error al procesar el pago. Intenta de nuevo.', true);
  }
};

// ═══ Verificar pago manualmente ═══
async function verifyPayment() {
  const msg = document.getElementById('verifyMsg');
  msg.innerHTML = '<span style="color:var(--gv-text-muted);font-size:0.85rem;">🔄 Consultando estado del pago…</span>';

  try {
    // Re-leer el documento de miembro desde Firestore
    const snap = await getDoc(doc(db, 'miembros', _session.uid));
    if (snap.exists() && snap.data().planStatus === 'active') {
      msg.innerHTML = '<span style="color:var(--gv-emerald-hover);font-size:0.85rem;">✅ ¡Pago verificado! Recargando…</span>';
      setTimeout(() => window.location.reload(), 1500);
    } else {
      msg.innerHTML = '<span style="color:#fda4af;font-size:0.85rem;">⚠️ Aún no se ha registrado el pago. Si pagaste hace más de 2 minutos, contacta soporte.</span>';
    }
  } catch (err) {
    msg.innerHTML = '<span style="color:#fda4af;font-size:0.85rem;">⚠️ Error al verificar: ' + err.message + '</span>';
  }
}

// ═══ Cancelar ═══
async function cancelar() {
  if (!confirm('¿Seguro que quieres cancelar tu membresía? Mantendrás acceso hasta el final del período pagado.')) return;
  const msg = document.getElementById('cancelMsg');
  msg.innerHTML = '<span style="color:var(--gv-text-muted);font-size:0.85rem;">Procesando…</span>';
  try {
    await updateDoc(doc(db, 'miembros', _session.uid), {
      planStatus: 'cancelled',
      canceladoEn: serverTimestamp()
    });
    msg.innerHTML = '<span style="color:var(--gv-emerald-hover);font-size:0.85rem;">✓ Membresía cancelada. Recargando…</span>';
    setTimeout(() => window.location.reload(), 1500);
  } catch (err) {
    msg.innerHTML = '<span style="color:#fda4af;font-size:0.85rem;">Error: ' + err.message + '</span>';
  }
}

// ═══ Reanudar ═══
async function reanudar() {
  const msg = document.getElementById('reanudarMsg');
  msg.innerHTML = '<span style="color:var(--gv-text-muted);font-size:0.85rem;">Reactivando…</span>';
  try {
    await updateDoc(doc(db, 'miembros', _session.uid), {
      planStatus: 'active',
      reanudadoEn: serverTimestamp()
    });
    msg.innerHTML = '<span style="color:var(--gv-emerald-hover);font-size:0.85rem;">✓ Membresía reactivada. Recargando…</span>';
    setTimeout(() => window.location.reload(), 1500);
  } catch (err) {
    msg.innerHTML = '<span style="color:#fda4af;font-size:0.85rem;">Error: ' + err.message + '</span>';
  }
}

// ═══ Detectar retorno de Stripe ?paid=1 ═══
function esperarActivacion() {
  const overlay = document.createElement('div');
  overlay.className = 'pay-wait-overlay';
  overlay.innerHTML = `
    <div class="pay-wait-modal">
      <div class="pay-wait-icon">🎓</div>
      <h2 style="font-family:var(--gv-ff);color:var(--gv-text);font-size:1.5rem;margin-bottom:0.5rem;">Procesando tu pago…</h2>
      <p style="color:var(--gv-text-muted);font-size:0.92rem;margin-bottom:1rem;line-height:1.5;">
        Estamos activando tu membresía VIP. Esto puede tomar <strong style="color:var(--gv-gold-hover);">hasta 1 minuto</strong>. No cierres esta ventana.
      </p>
      <div class="pay-wait-dots">
        <span class="pay-wait-dot"></span>
        <span class="pay-wait-dot"></span>
        <span class="pay-wait-dot"></span>
      </div>
      <div id="payWaitStatus" style="color:var(--gv-text-muted);font-size:0.82rem;">Verificando con el servidor…</div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Reintentar cada 3s por hasta 90s
  let intentos = 0;
  const interval = setInterval(async () => {
    intentos++;
    try {
      const snap = await getDoc(doc(db, 'miembros', _session.uid));
      if (snap.exists() && snap.data().planStatus === 'active') {
        clearInterval(interval);
        document.getElementById('payWaitStatus').textContent = '✅ ¡Membresía activada! Recargando…';
        setTimeout(() => { window.location.href = 'club-suscripcion.html'; }, 1500);
        return;
      }
    } catch(e) {}
    if (intentos >= 30) {
      clearInterval(interval);
      document.getElementById('payWaitStatus').innerHTML = '⚠️ El pago está tardando más de lo normal. Usa el botón "Verificar mi pago" más abajo. <button onclick="this.closest(\'.pay-wait-overlay\').remove();window.location.href=\'club-suscripcion.html\';" style="background:none;border:1px solid var(--gv-gold);color:var(--gv-gold);padding:6px 16px;border-radius:6px;margin-top:8px;cursor:pointer;">Cerrar</button>';
    } else {
      document.getElementById('payWaitStatus').textContent = `Verificando… (intento ${intentos}/30)`;
    }
  }, 3000);
}

// ═══ MAIN ═══
(async () => {
  _session = await requireAuth();
  if (!_session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(_session);
  document.getElementById('sidebar').innerHTML = renderSidebar('suscripcion');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  // ¿Viene de Stripe con ?paid=1?
  const params = new URLSearchParams(location.search);
  if (params.has('paid')) {
    esperarActivacion();
    return;
  }
  if (params.has('canceled')) {
    toast('Cancelaste el pago. Puedes intentar de nuevo cuando quieras.', true);
  }

  // Leer el documento del miembro
  let miembro = {};
  try {
    const snap = await getDoc(doc(db, 'miembros', _session.uid));
    if (snap.exists()) miembro = snap.data();
  } catch(e) { console.warn('No se pudo leer miembro:', e); }

  // Decidir vista según estado
  if (!miembro.planStatus || miembro.planStatus === 'pending_payment') {
    renderSinPago();
  } else {
    renderActiva(miembro);
  }
})();
</script>
</body>
</html>
