<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .news-list{display:flex;flex-direction:column;gap:1rem}
  .news-item{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1.2rem;display:flex;gap:1rem;transition:transform .15s,box-shadow .15s}
  .news-item:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
  .news-badge{background:var(--plight);color:var(--purple);font-size:.68rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;display:inline-block;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
  .news-title{font-family:var(--ff);font-size:1.05rem;font-weight:700;margin-bottom:.4rem;line-height:1.3;color:var(--dark)}
  .news-summary{font-size:.88rem;color:var(--muted);margin-bottom:.6rem;line-height:1.5}
  .news-footer{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--muted)}
  .news-footer a{color:var(--purple);font-weight:700}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>📰 Noticias veterinarias</h1>
      <p>Actualidad en medicina veterinaria, práctica clínica y novedades del sector</p>
    </div>
    <div id="content" class="loading">Cargando noticias…</div>
  </main>
</div>
<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, db, collection, query, orderBy, getDocs } from '../assets/js/club-extra.js';
(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('noticias');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  let news = [];
  try {
    const snap = await getDocs(query(collection(db, 'noticias'), orderBy('fecha', 'desc')));
    news = snap.docs.map(d => ({ id: d.id, ...d.data() })).slice(0, 30);
  } catch (err) { console.log('Sin noticias:', err.message); }

  const content = document.getElementById('content');
  content.classList.remove('loading');

  if (news.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📡</div>
        <h3 style="font-family:var(--ff);color:var(--dark);margin-bottom:.5rem;">Aún no hay noticias</h3>
        <p>Pronto publicaremos actualidad veterinaria sincronizada automáticamente desde fuentes de prestigio (AVMA, DVM360, Veterinary Practice) cada 6 horas.</p>
      </div>`;
    return;
  }

  content.innerHTML = `<div class="news-list">
    ${news.map(n => {
      const fecha = n.fecha?.toDate ? n.fecha.toDate().toLocaleDateString('es-MX', {day:'numeric',month:'short'}) : '';
      return `
        <article class="news-item">
          <div style="flex:1;min-width:0;">
            <span class="news-badge">${n.fuente || 'Veterinaria'}</span>
            <h3 class="news-title">${n.titulo || 'Noticia'}</h3>
            <p class="news-summary">${(n.resumen || '').slice(0, 220)}${(n.resumen||'').length > 220 ? '…' : ''}</p>
            <div class="news-footer">
              <span>${fecha}</span>
              ${n.url ? `<a href="${n.url}" target="_blank" rel="noopener">Leer más →</a>` : ''}
            </div>
          </div>
        </article>`;
    }).join('')}
  </div>`;
})();
</script>
</body>
</html>
