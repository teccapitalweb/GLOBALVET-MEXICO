<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias veterinarias · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .news-filters {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .news-filter {
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--gv-border);
    border-radius: 50px;
    color: var(--gv-text-muted);
    font-family: var(--gv-ff);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .news-filter.active {
    background: var(--gv-purple);
    color: #fff;
    border-color: var(--gv-purple);
  }
  .news-filter:hover:not(.active) {
    background: rgba(139, 92, 246, 0.1);
    color: var(--gv-text);
  }

  .news-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  .news-item {
    background: var(--gv-bg-surface);
    border: 1px solid var(--gv-border);
    border-radius: var(--gv-radius-lg);
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
  }
  .news-item:hover {
    transform: translateY(-2px);
    border-color: var(--gv-purple);
    box-shadow: 0 12px 30px rgba(139, 92, 246, 0.15);
  }
  .news-img {
    width: 100%;
    height: 100%;
    min-height: 180px;
    background: linear-gradient(135deg, var(--gv-purple-deep), var(--gv-bg-surface-3));
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .news-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(26, 16, 64, 0.15) 80%, rgba(26, 16, 64, 0.3) 100%);
    pointer-events: none;
  }
  .news-body {
    padding: 1.4rem 1.6rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .news-item-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.6rem;
  }
  .news-source {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: rgba(245, 158, 11, 0.12);
    color: var(--gv-gold-hover);
    padding: 0.25rem 0.7rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .news-date {
    color: var(--gv-text-dim);
    font-size: 0.78rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .news-title {
    font-family: var(--gv-ff);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gv-text);
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }
  .news-summary {
    color: var(--gv-text-muted);
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 0.8rem;
  }
  .news-cta {
    color: var(--gv-gold);
    font-size: 0.85rem;
    font-weight: 700;
    font-family: var(--gv-ff);
  }

  @media (max-width: 720px) {
    .news-item {
      grid-template-columns: 1fr;
    }
    .news-img {
      min-height: 180px;
      max-height: 200px;
    }
  }
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">

    <div class="hero-banner">
      <div class="hero-badge">📰 Actualidad</div>
      <h2>Noticias veterinarias</h2>
      <p>Actualidad en medicina veterinaria, novedades clínicas, avances en diagnóstico y tratamiento, novedades regulatorias.</p>
    </div>

    <div class="news-filters">
      <button class="news-filter active" data-cat="todas">Todas</button>
      <button class="news-filter" data-cat="clinica">Clínica</button>
      <button class="news-filter" data-cat="farma">Farmacología</button>
      <button class="news-filter" data-cat="regulatorio">Regulatorio</button>
      <button class="news-filter" data-cat="investigacion">Investigación</button>
      <button class="news-filter" data-cat="gremial">Gremial</button>
    </div>

    <div id="content" class="news-list"></div>
  </main>
</div>

<script type="module">

// Imágenes fallback por categoría (por si admin sube sin imagen)
const IMG_FALLBACK = {
  clinica:      'https://images.unsplash.com/photo-1599443015574-be5fe8a05783?w=600&q=80',
  farma:        'https://images.unsplash.com/photo-1587854692152-cbe660dbde88?w=600&q=80',
  regulatorio:  'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=600&q=80',
  investigacion:'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=600&q=80',
  gremial:      'https://images.unsplash.com/photo-1584308878768-57d3e1e9abd7?w=600&q=80'
};

function formatFecha(d) {
  const diff = Date.now() - d.getTime();
  const dias = Math.floor(diff / 86400000);
  if (dias === 0) return 'hoy';
  if (dias === 1) return 'ayer';
  if (dias < 7) return `hace ${dias} días`;
  if (dias < 30) return `hace ${Math.floor(dias/7)} sem`;
  return d.toLocaleDateString('es-MX', { day:'numeric', month:'short' });
}

let noticiasData = [...NEWS_DEMO];

function render(filter = 'todas') {
  const content = document.getElementById('content');
  const list = filter === 'todas' ? noticiasData : noticiasData.filter(n => n.cat === filter);

  if (list.length === 0) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><h3>No hay noticias en esta categoría</h3></div>`;
    return;
  }

  content.innerHTML = list.map(n => {
    const img = n.imagen || IMG_FALLBACK[n.cat] || IMG_FALLBACK.clinica;
    return `
      <article class="news-item" ${n.url && n.url !== '#' ? `onclick="window.open('${n.url}','_blank')"` : ''}>
        <div class="news-img" style="background-image: url('${img}');"></div>
        <div class="news-body">
          <div class="news-item-top">
            <span class="news-source">${n.fuente}</span>
            <span class="news-date">${formatFecha(n.fecha)}</span>
          </div>
          <h3 class="news-title">${n.titulo}</h3>
          <p class="news-summary">${n.resumen}</p>
          ${n.url && n.url !== '#' ? `<span class="news-cta">Leer más →</span>` : ''}
        </div>
      </article>`;
  }).join('');
}

(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('noticias');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  // Intentar traer de Firestore primero (si el admin las ha cargado)
  try {
    const snap = await getDocs(query(collection(db, 'noticias'), orderBy('fecha', 'desc')));
    if (snap.size > 0) {
      noticiasData = snap.docs.map(d => {
        const data = d.data();
        return {
          titulo: data.titulo,
          fuente: data.fuente || 'GlobalVet',
          cat: data.cat || 'clinica',
          fecha: data.fecha?.toDate() || new Date(),
          imagen: data.imagen || null,
          resumen: data.resumen || '',
          url: data.url || '#'
        };
      });
    }
  } catch (e) { console.log('Usando noticias demo'); }

  render();
  document.querySelectorAll('.news-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.news-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.cat);
    });
  });
})();
</script>
</body>
</html>
