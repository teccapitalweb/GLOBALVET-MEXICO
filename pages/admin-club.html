<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Club · GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .tabs{display:flex;gap:.3rem;border-bottom:2px solid var(--line);margin-bottom:1.5rem;overflow-x:auto}
  .tab{padding:.7rem 1.1rem;background:none;border:none;color:var(--muted);font-family:var(--ff);font-size:.88rem;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
  .tab.active{color:var(--purple);border-bottom-color:var(--purple)}
  .panel-a{display:none}
  .panel-a.active{display:block}
  .item-row{display:flex;align-items:center;gap:.8rem;padding:.9rem 1.1rem;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:.6rem}
  .item-row-info{flex:1;min-width:0}
  .item-row-title{font-family:var(--ff);font-weight:700;margin-bottom:.2rem}
  .item-row-meta{font-size:.78rem;color:var(--muted)}
  .item-row-actions{display:flex;gap:.4rem}
  .btn-small{padding:.4rem .8rem;border-radius:8px;font-size:.78rem;font-weight:700;font-family:var(--ff)}
  .btn-edit{background:var(--plight);color:var(--purple)}
  .btn-del{background:#fee;color:var(--red)}
  .no-access{text-align:center;padding:3rem;background:var(--surface);border-radius:14px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:1.8rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
  .modal h3{font-family:var(--ff);margin-bottom:1rem}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>⚙️ Administración del Club</h1>
      <p>Gestiona contenido del Club VIP: videos, PDFs, noticias y miembros</p>
    </div>
    <div id="root" class="loading">Cargando…</div>
  </main>
</div>

<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>

<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, toast, db, collection, query, orderBy, getDocs, addDoc, doc, updateDoc, serverTimestamp } from '../assets/js/club-extra.js';
import { deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const session = await requireAuth();
if (!session) throw new Error('sin sesión');
document.getElementById('topnav').innerHTML = renderTopNav(session);
document.getElementById('sidebar').innerHTML = renderSidebar('');
document.getElementById('btnLogout')?.addEventListener('click', doLogout);

const root = document.getElementById('root');

if (session.role !== 'admin') {
  root.classList.remove('loading');
  root.innerHTML = `
    <div class="no-access">
      <div style="font-size:3rem;margin-bottom:.8rem;">🔒</div>
      <h3 style="font-family:var(--ff);margin-bottom:.5rem;">Acceso restringido</h3>
      <p style="color:var(--muted);margin-bottom:.5rem;">Esta sección es solo para administradores.</p>
      <p style="font-size:.82rem;color:var(--muted);">Para asignarte rol admin: Firebase Console → Firestore → miembros → tu documento → agregar campo <code>role: "admin"</code></p>
      <a href="club-dashboard.html" class="btn btn-primary" style="margin-top:1rem;">← Volver</a>
    </div>`;
} else {
  root.classList.remove('loading');
  root.innerHTML = `
    <div class="tabs">
      <button class="tab active" data-p="videos">🎥 Videos</button>
      <button class="tab" data-p="pdfs">📄 PDFs</button>
      <button class="tab" data-p="noticias">📰 Noticias</button>
    </div>
    <div id="p-videos" class="panel-a active">Cargando…</div>
    <div id="p-pdfs" class="panel-a">Cargando…</div>
    <div id="p-noticias" class="panel-a">Cargando…</div>`;

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.panel-a').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('p-' + t.dataset.p).classList.add('active');
    });
  });

  await Promise.all([renderList('videos'), renderList('pdfs'), renderList('noticias')]);
}

const FIELDS = {
  videos:   [['title','Título'],['area','Área'],['duration','Duración (ej: 12 min)'],['driveId','ID de Google Drive']],
  pdfs:     [['title','Título'],['area','Área'],['pages','Páginas'],['driveId','ID de Google Drive']],
  noticias: [['titulo','Título'],['fuente','Fuente (AVMA, DVM360…)'],['resumen','Resumen','textarea'],['url','URL completa']]
};

async function renderList(coll) {
  const panel = document.getElementById('p-' + coll);
  let items = [];
  try {
    const snap = await getDocs(query(collection(db, coll), orderBy('createdAt', 'desc')));
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e){ console.log(coll, e.message); }

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <strong>${items.length} elemento${items.length !== 1 ? 's' : ''}</strong>
      <button class="btn btn-primary" onclick="window._new('${coll}')">+ Nuevo</button>
    </div>
    ${items.length === 0 ? '<div class="empty">Sin elementos. Crea el primero.</div>' :
      items.map(it => `
        <div class="item-row">
          <div class="item-row-info">
            <div class="item-row-title">${it.title || it.titulo || '—'}</div>
            <div class="item-row-meta">${it.area || it.fuente || ''} ${it.createdAt?.toDate ? '· ' + it.createdAt.toDate().toLocaleDateString('es-MX') : ''}</div>
          </div>
          <div class="item-row-actions">
            <button class="btn btn-small btn-edit" onclick='window._edit("${coll}","${it.id}", ${JSON.stringify(it).replace(/'/g,"&#39;")})'>Editar</button>
            <button class="btn btn-small btn-del" onclick='window._del("${coll}","${it.id}", ${JSON.stringify(it.title||it.titulo||"")})'>🗑️</button>
          </div>
        </div>`).join('')}
  `;
}

window._new = (coll) => window._edit(coll, '', {});
window._edit = (coll, id, data) => {
  const fields = FIELDS[coll];
  document.getElementById('modalContent').innerHTML = `
    <h3>${id ? 'Editar' : 'Nuevo'} ${coll.slice(0,-1)}</h3>
    ${fields.map(([k, label, type]) => `
      <div class="field">
        <label>${label}</label>
        ${type === 'textarea'
          ? `<textarea id="f_${k}" rows="4">${data[k] || ''}</textarea>`
          : `<input type="text" id="f_${k}" value="${(data[k] || '').toString().replace(/"/g,'&quot;')}">`}
      </div>
    `).join('')}
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="document.getElementById('modal').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary" onclick="window._save('${coll}','${id}')">${id ? 'Guardar' : 'Crear'}</button>
    </div>`;
  document.getElementById('modal').classList.add('open');
};
window._save = async (coll, id) => {
  const fields = FIELDS[coll];
  const obj = {};
  fields.forEach(([k]) => {
    const el = document.getElementById('f_' + k);
    if (el) obj[k] = el.value.trim();
  });
  // Extraer ID de URL de Drive si viene completo
  if (obj.driveId) {
    const m = obj.driveId.match(/\/d\/([^\/\?]+)/);
    if (m) obj.driveId = m[1];
  }
  try {
    if (id) {
      await updateDoc(doc(db, coll, id), obj);
      toast('✅ Actualizado');
    } else {
      obj.createdAt = serverTimestamp();
      if (coll === 'noticias') obj.fecha = serverTimestamp();
      await addDoc(collection(db, coll), obj);
      toast('✅ Creado');
    }
    document.getElementById('modal').classList.remove('open');
    await renderList(coll);
  } catch (err) { toast('Error: ' + err.message, true); }
};
window._del = async (coll, id, title) => {
  if (!confirm(`¿Eliminar "${title}"?`)) return;
  try {
    await deleteDoc(doc(db, coll, id));
    toast('🗑️ Eliminado');
    await renderList(coll);
  } catch (err) { toast('Error al eliminar', true); }
};

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') e.target.classList.remove('open');
});
</script>
</body>
</html>
