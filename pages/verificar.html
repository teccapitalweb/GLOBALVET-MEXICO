<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar constancia · GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  body{background:var(--bg);padding:2rem 1rem;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .v-wrap{max-width:520px;width:100%;background:var(--surface);border-radius:18px;padding:2.2rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,.08);text-align:center}
  .v-logo{width:56px;height:56px;border-radius:14px;margin-bottom:.8rem}
  .v-brand{font-family:var(--ff);font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:.3rem}
  .v-head{color:var(--muted);font-size:.82rem;margin-bottom:1.8rem;text-transform:uppercase;letter-spacing:.08em}
  .v-status{padding:1.2rem;border-radius:14px;margin-bottom:1rem}
  .v-status.ok{background:#d1fae5;color:#065f46}
  .v-status.err{background:#fee;color:var(--red)}
  .v-status-icon{font-size:2.5rem;margin-bottom:.4rem}
  .v-status h2{font-family:var(--ff);font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
  .v-detail{text-align:left;background:var(--bg);padding:1rem 1.2rem;border-radius:10px;margin-top:1rem;font-size:.88rem}
  .v-detail div{margin-bottom:.4rem}
  .v-detail strong{color:var(--dark);font-family:var(--ff)}
  .field input{text-align:center;font-family:monospace;letter-spacing:.08em}
</style>
</head>
<body>
<div class="v-wrap">
  <img src="../assets/logo/globalvet-logo.jpg" alt="" class="v-logo">
  <div class="v-brand">GLOBALVET MÉXICO</div>
  <div class="v-head">Verificador oficial de constancias</div>
  <div id="content">
    <div class="field">
      <label>Ingresa el folio de la constancia</label>
      <input type="text" id="folioInput" placeholder="Ej: GV-2026-ABC123" autocomplete="off">
    </div>
    <button class="btn btn-primary btn-block" id="btnVerify">Verificar</button>
    <div id="result" style="margin-top:1.5rem;"></div>
  </div>
  <div style="margin-top:1.5rem;font-size:.78rem;color:var(--muted)">
    <a href="../index.html" style="color:var(--purple);">← Volver al sitio principal</a>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyB_OgAmyW7XNiLUyKp6Ih92A5qxm3LNCqg",
  authDomain:"globalvet-club.firebaseapp.com",
  projectId:"globalvet-club",
  storageBucket:"globalvet-club.firebasestorage.app",
  messagingSenderId:"880780506385",
  appId:"1:880780506385:web:be49dbc8886147a79048b0"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

async function verificar(folio) {
  const result = document.getElementById('result');
  result.innerHTML = '<div style="color:var(--muted);">Buscando…</div>';
  try {
    const snap = await getDocs(query(collection(db, 'certificados'), where('folio', '==', folio)));
    if (snap.empty) {
      result.innerHTML = `
        <div class="v-status err">
          <div class="v-status-icon">❌</div>
          <h2>Constancia no encontrada</h2>
          <p>El folio <strong>${folio}</strong> no existe en nuestros registros.</p>
        </div>`;
      return;
    }
    const c = snap.docs[0].data();
    const fecha = c.completadoEn?.toDate ? c.completadoEn.toDate().toLocaleDateString('es-MX', {year:'numeric',month:'long',day:'numeric'}) : '—';
    result.innerHTML = `
      <div class="v-status ok">
        <div class="v-status-icon">✅</div>
        <h2>Constancia verificada</h2>
        <p>Este documento es auténtico y fue emitido por GlobalVet México.</p>
      </div>
      <div class="v-detail">
        <div><strong>Curso:</strong> ${c.cursoTitulo || '—'}</div>
        <div><strong>A nombre de:</strong> ${c.nombre || 'Miembro VIP'}</div>
        <div><strong>Fecha:</strong> ${fecha}</div>
        <div><strong>Folio:</strong> <code>${folio}</code></div>
      </div>`;
  } catch (err) {
    result.innerHTML = `<div class="v-status err"><div class="v-status-icon">⚠️</div><h2>Error de verificación</h2><p>No se pudo conectar al servidor.</p></div>`;
  }
}

document.getElementById('btnVerify').addEventListener('click', () => {
  const folio = document.getElementById('folioInput').value.trim();
  if (folio) verificar(folio);
});
document.getElementById('folioInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnVerify').click();
});

// Auto-verificar si viene folio en URL
const auto = new URLSearchParams(location.search).get('folio');
if (auto) {
  document.getElementById('folioInput').value = auto;
  verificar(auto);
}
</script>
</body>
</html>
