<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados · Club GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  .cert-card{background:linear-gradient(135deg,#fef3c7 0%,#fff 100%);border:2px solid var(--gold);border-radius:16px;padding:1.5rem;position:relative;overflow:hidden}
  .cert-card::before{content:"🏆";position:absolute;top:-20px;right:-20px;font-size:6rem;opacity:.08}
  .cert-title{font-family:var(--ff);font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:.4rem}
  .cert-folio{font-family:monospace;font-size:.8rem;color:var(--muted);background:#fff;display:inline-block;padding:.3rem .6rem;border-radius:6px;margin-bottom:.8rem}
  .cert-meta{font-size:.82rem;color:var(--muted);margin-bottom:1rem}
  .cert-actions{display:flex;gap:.5rem;flex-wrap:wrap}
</style>
</head>
<body>
<nav class="tnav" id="topnav"></nav>
<div class="dlayout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dmain">
    <div class="ph">
      <h1>🏆 Mis certificados</h1>
      <p>Constancias con folio único y QR verificable por cada curso completado</p>
    </div>
    <div id="content" class="loading">Cargando certificados…</div>
  </main>
</div>
<script type="module">
import { requireAuth, renderSidebar, renderTopNav, doLogout, db, collection, query, where, getDocs } from '../assets/js/club-extra.js';
(async () => {
  const session = await requireAuth();
  if (!session) return;
  document.getElementById('topnav').innerHTML = renderTopNav(session);
  document.getElementById('sidebar').innerHTML = renderSidebar('certificados');
  document.getElementById('btnLogout')?.addEventListener('click', doLogout);

  let certs = [];
  try {
    const snap = await getDocs(query(collection(db, 'certificados'), where('uid', '==', session.uid)));
    certs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (err) { console.log('Sin certificados aún:', err.message); }

  const content = document.getElementById('content');
  content.classList.remove('loading');

  if (certs.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎓</div>
        <h3 style="font-family:var(--ff);color:var(--dark);margin-bottom:.5rem;">Aún no tienes certificados</h3>
        <p>Completa los cursos de la Biblioteca para generar tu primera constancia con folio único y código QR.</p>
        <a href="club-dashboard.html" class="btn btn-primary" style="margin-top:1rem;">Ir a mis cursos</a>
      </div>`;
    return;
  }

  content.innerHTML = `<div class="card-grid">
    ${certs.map(c => `
      <div class="cert-card">
        <div class="cert-title">${c.cursoTitulo || 'Curso veterinario'}</div>
        <div class="cert-folio">Folio: ${c.folio || c.id.slice(0,10).toUpperCase()}</div>
        <div class="cert-meta">
          Completado: ${c.completadoEn?.toDate ? c.completadoEn.toDate().toLocaleDateString('es-MX') : '—'}<br>
          A nombre de: <strong>${session.name}</strong>
        </div>
        <div class="cert-actions">
          <a href="ver-certificado.html?folio=${c.folio || c.id}" class="btn btn-gold">Ver constancia</a>
          <a href="verificar.html?folio=${c.folio || c.id}" class="btn btn-outline" target="_blank">Verificar QR</a>
        </div>
      </div>`).join('')}
  </div>`;
})();
</script>
</body>
</html>
