<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constancia · GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/club-extra.css">
<style>
  body{background:#e5e7eb;padding:2rem 1rem;min-height:100vh}
  .cert-wrap{max-width:900px;margin:0 auto}
  .cert-bar{display:flex;gap:.6rem;justify-content:flex-end;margin-bottom:1rem}
  .cert-paper{background:#fff;border:8px double var(--gold);padding:3rem 3rem 2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.15);position:relative;aspect-ratio:1.414}
  .cert-header{text-align:center;border-bottom:2px solid var(--gold);padding-bottom:1.2rem;margin-bottom:2rem}
  .cert-logo{width:64px;height:64px;border-radius:14px;margin-bottom:.8rem}
  .cert-brand{font-family:var(--ff);font-size:1rem;font-weight:700;color:var(--dark);letter-spacing:.05em}
  .cert-sub{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .cert-label{text-align:center;font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:.4rem;font-style:italic}
  .cert-name{text-align:center;font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;color:var(--dark);margin-bottom:1.5rem;line-height:1.2;border-bottom:1px solid var(--line);padding-bottom:1rem}
  .cert-body{text-align:center;font-size:1.05rem;color:var(--dark);margin-bottom:1rem;line-height:1.7}
  .cert-body strong{color:var(--purple)}
  .cert-footer{display:flex;justify-content:space-between;align-items:end;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--line)}
  .cert-sign{text-align:center}
  .cert-sign-line{width:200px;border-top:1.5px solid var(--dark);padding-top:.3rem;font-family:var(--ff);font-size:.82rem;font-weight:700;color:var(--dark)}
  .cert-sign-sub{font-size:.72rem;color:var(--muted)}
  .cert-qr{text-align:center;font-size:.72rem;color:var(--muted)}
  .cert-qr img{width:90px;height:90px;display:block;margin:0 auto .4rem;border:1px solid var(--line);padding:4px;background:#fff}
  .cert-folio{font-family:monospace;font-size:.78rem;color:var(--muted);margin-top:.3rem}
  @media print{
    body{background:#fff;padding:0}
    .cert-bar{display:none}
    .cert-paper{box-shadow:none}
  }
  @media (max-width:680px){
    .cert-paper{padding:1.5rem;aspect-ratio:auto}
    .cert-name{font-size:1.5rem}
    .cert-footer{flex-direction:column;gap:1.5rem}
  }
</style>
</head>
<body>
<div class="cert-wrap">
  <div class="cert-bar">
    <a href="club-certificados.html" class="btn btn-outline">← Volver</a>
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Descargar PDF</button>
  </div>
  <div class="cert-paper" id="paper">
    <div class="cert-header">
      <img src="../assets/logo/globalvet-logo.jpg" alt="" class="cert-logo">
      <div class="cert-brand">GLOBALVET MÉXICO</div>
      <div class="cert-sub">Capacitación veterinaria profesional</div>
    </div>
    <div class="cert-label">Otorga la presente constancia a</div>
    <div class="cert-name" id="cName">—</div>
    <div class="cert-body">
      Por haber completado satisfactoriamente el curso<br>
      <strong id="cCurso">—</strong><br>
      impartido en el <strong>Club VIP de GlobalVet México</strong>.
    </div>
    <div class="cert-footer">
      <div class="cert-sign">
        <div class="cert-sign-line">Dr. GlobalVet México</div>
        <div class="cert-sign-sub">Dirección académica</div>
      </div>
      <div class="cert-qr">
        <img id="qrImg" src="" alt="QR">
        Verifica en<br>globalvetmexico.com/verificar
        <div class="cert-folio" id="cFolio">—</div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { requireAuth, db, collection, query, where, getDocs } from '../assets/js/club-extra.js';

(async () => {
  const session = await requireAuth();
  if (!session) return;

  const folio = new URLSearchParams(location.search).get('folio') || '';
  let cert = null;
  try {
    const snap = await getDocs(query(collection(db, 'certificados'), where('uid','==',session.uid)));
    cert = snap.docs.map(d=>({id:d.id,...d.data()})).find(c => c.folio === folio || c.id === folio);
  } catch(e){}

  document.getElementById('cName').textContent = session.name || 'Miembro VIP';
  document.getElementById('cCurso').textContent = cert?.cursoTitulo || 'Curso veterinario';
  document.getElementById('cFolio').textContent = 'Folio: ' + (folio || 'SIN-FOLIO');

  // Generar QR con API externa (no requiere config)
  const verifyUrl = `${location.origin}/pages/verificar.html?folio=${encodeURIComponent(folio)}`;
  document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(verifyUrl)}`;
})();
</script>
</body>
</html>
